<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cardápio 3D - Restaurante</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: sans-serif;
        background-color: #000;
      }

      #video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }

      #ar-scene {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      #order-panel.show ~ #ar-scene {
        pointer-events: auto;
      }

      #menu-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 100;
        overflow-y: auto;
        transition: 0.4s ease;
        transform: translateX(0);
      }
      #menu-screen.hide {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }

      .header {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        text-align: center;
        color: white;
      }
      .table-info {
        font-size: 18px;
        background: rgba(255, 255, 255, 0.2);
        display: inline-block;
        padding: 5px 20px;
        border-radius: 25px;
        margin-top: 10px;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        padding: 20px;
      }
      .product-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      .product-image {
        width: 100%;
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        background: #f9f9f9;
      }
      .product-info {
        padding: 15px;
      }
      .product-price {
        font-size: 20px;
        font-weight: bold;
        color: #4caf50;
        margin: 10px 0;
      }

      .select-btn {
        width: 100%;
        padding: 15px;
        background: #4caf50;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
      }

      #back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 30px;
        z-index: 200;
        display: none;
        cursor: pointer;
      }

      #order-panel {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        z-index: 200;
        transform: translateY(150%);
        transition: 0.3s ease;
      }
      #order-panel.show {
        transform: translateY(0);
      }

      .product-info-ar {
        display: flex;
        justify-content: space-between;
        color: white;
        margin-bottom: 15px;
      }
      .order-controls {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      .quantity-control {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.1);
        padding: 5px 15px;
        border-radius: 25px;
        color: white;
      }
      .qty-btn {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        border: none;
        font-weight: bold;
        cursor: pointer;
      }
      .confirm-btn {
        flex: 1;
        padding: 15px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
      }

      .camera-status {
        position: absolute;
        bottom: 10px;
        right: 10px;
        color: #ff9800;
        font-size: 12px;
        z-index: 200;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px;
      }
      .config-panel {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 300;
        display: flex;
        gap: 5px;
      }
      .config-panel input {
        padding: 5px;
        border-radius: 5px;
        border: none;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <video id="video-background" autoplay playsinline muted></video>

    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      background="transparent: true"
      gesture-detector
    >
      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>
      <a-entity camera position="0 0 0"></a-entity>
      <a-entity
        id="ar-model"
        class="clickable"
        gesture-handler="enabled: true"
        position="0 0.5 -4"
      ></a-entity>
    </a-scene>

    <div class="config-panel">
      <input
        type="text"
        id="backend-url"
        placeholder="URL Backend"
        value="http://localhost:3000"
      />
      <button onclick="saveUrl()" style="padding: 5px 10px; cursor: pointer">
        Salvar
      </button>
    </div>

    <div id="menu-screen">
      <div class="header">
        <h1>🍽️ Cardápio 3D</h1>
        <div class="table-info">Mesa <span id="table-number">1</span></div>
      </div>
      <div id="product-list" class="product-grid"></div>
    </div>

    <button id="back-btn">← Voltar</button>

    <div id="order-panel">
      <div class="product-info-ar">
        <span id="ar-product-name" style="font-weight: bold; font-size: 18px"
          >---</span
        >
        <span id="ar-product-price" style="color: #4caf50; font-size: 18px"
          >R$ 0,00</span
        >
      </div>
      <div class="order-controls">
        <div class="quantity-control">
          <button class="qty-btn" onclick="updateQty(-1)">-</button>
          <span id="quantity" style="font-weight: bold">1</span>
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        <button id="confirm-order" class="confirm-btn">📝 Fazer Pedido</button>
      </div>
    </div>

    <div class="camera-status" id="camera-status">📷 Aguardando câmera...</div>

    <script>
      const products = [
        {
          id: 1,
          name: "Hambúrguer Artesanal",
          description: "Carne 180g, queijo, bacon",
          price: 32.9,
          modelFile: "hamburguer.glb",
          emoji: "🍔",
          color: "#ff9800",
          scale: "0.2 0.2 0.2",
          position: "0 0.5 -4",
        },
        {
          id: 2,
          name: "Pizza Margherita",
          description: "Mussarela, manjericão",
          price: 45.9,
          modelFile: "pizza.glb",
          emoji: "🍕",
          color: "#f44336",
          scale: "0.15 0.15 0.15",
          position: "0 0 -3",
        },
        {
          id: 3,
          name: "Refrigerante",
          description: "Coca-Cola 350ml",
          price: 7.5,
          modelFile: "soda.glb",
          emoji: "🥤",
          color: "#2196f3",
          scale: "0.2 0.2 0.2",
          position: "0 0.8 -3.5",
        },
      ];

      let currentProduct = null;
      let currentQuantity = 1;
      let BACKEND_URL =
        localStorage.getItem("backend_url") || "http://localhost:3000";

      // 1. Inicia Câmera
      async function setupCamera() {
        const video = document.getElementById("video-background");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });
          video.srcObject = stream;
          document.getElementById("camera-status").textContent =
            "📷 Câmera Ativa";
        } catch (e) {
          document.getElementById("camera-status").textContent =
            "⚠️ Erro na câmera";
        }
      }

      // 2. Renderiza Produtos (CORRIGIDO)
      function renderProducts() {
        const container = document.getElementById("product-list");
        container.innerHTML = "";
        products.forEach((p) => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <div class="product-image" style="background: ${p.color}15">${p.emoji}</div>
            <div class="product-info">
              <h3>${p.name}</h3>
              <p style="color: #666; font-size: 14px; margin: 5px 0;">${p.description}</p>
              <div class="product-price">R$ ${p.price.toFixed(2)}</div>
              <button class="select-btn" onclick="selectProduct(${p.id})">🔍 Ver em 3D</button>
            </div>
          `;
          container.appendChild(card);
        });
      }

      // 3. Selecionar Produto
      function selectProduct(id) {
        const product = products.find((p) => p.id === id);
        if (!product) return;

        currentProduct = product;
        currentQuantity = 1;
        document.getElementById("quantity").textContent = "1";
        document.getElementById("ar-product-name").textContent = product.name;
        document.getElementById("ar-product-price").textContent =
          `R$ ${product.price.toFixed(2)}`;

        // Carrega 3D
        const modelParent = document.getElementById("ar-model");
        modelParent.innerHTML = "";
        const model = document.createElement("a-entity");
        model.setAttribute(
          "gltf-model",
          `url(assets/models/${product.modelFile})`,
        );
        model.setAttribute("scale", product.scale);
        model.setAttribute(
          "animation",
          "property: rotation; to: 0 360 0; dur: 20000; easing: linear; loop: true",
        );
        modelParent.appendChild(model);

        // UI
        document.getElementById("menu-screen").classList.add("hide");
        document.getElementById("back-btn").style.display = "block";
        document.getElementById("order-panel").classList.add("show");
      }

      // 4. Enviar Pedido (DTO COMPATÍVEL)
      async function makeOrder() {
        if (!currentProduct) return;

        const btn = document.getElementById("confirm-order");
        btn.disabled = true;
        btn.textContent = "Enviando...";

        const urlParams = new URLSearchParams(window.location.search);
        const tableNum = parseInt(urlParams.get("mesa")) || 1;

        const orderData = {
          tableNumber: tableNum,
          productId: String(currentProduct.id),
          productName: currentProduct.name,
          productPrice: currentProduct.price,
          quantity: currentQuantity,
          status: "pending",
          observation: "",
        };

        try {
          const res = await fetch(`${BACKEND_URL}/orders`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(orderData),
          });

          if (res.ok) {
            alert("✅ Pedido enviado com sucesso!");
            backToMenu();
          } else {
            const err = await res.json();
            alert("❌ Erro: " + (err.message || "Falha no servidor"));
          }
        } catch (e) {
          alert("❌ Erro de conexão com o backend!");
        } finally {
          btn.disabled = false;
          btn.textContent = "📝 Fazer Pedido";
        }
      }

      // Utils
      function updateQty(val) {
        currentQuantity = Math.max(1, currentQuantity + val);
        document.getElementById("quantity").textContent = currentQuantity;
      }

      function backToMenu() {
        document.getElementById("menu-screen").classList.remove("hide");
        document.getElementById("back-btn").style.display = "none";
        document.getElementById("order-panel").classList.remove("show");
        document.getElementById("ar-model").innerHTML = "";
      }

      function saveUrl() {
        BACKEND_URL = document.getElementById("backend-url").value;
        localStorage.setItem("backend_url", BACKEND_URL);
        alert("URL salva!");
      }

      // Init
      document.getElementById("back-btn").onclick = backToMenu;
      document.getElementById("confirm-order").onclick = makeOrder;

      window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById("table-number").textContent =
          urlParams.get("mesa") || "1";
        renderProducts();
        setupCamera();
      };
    </script>
  </body>
</html>
