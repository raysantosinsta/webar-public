<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cardápio 3D - Fixo na Tela</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #000; /* Fundo preto enquanto a câmera carrega */
      }

      /* --- CÂMERA DE FUNDO (CSS) --- */
      #video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1; /* Fica atrás de tudo */
      }

      /* --- CENA 3D (A-Frame) --- */
      #ar-scene {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1; /* Fica na frente da câmera, atrás do menu */
        pointer-events: none; /* Deixa cliques passarem para o menu quando ele estiver visível */
      }
      
      /* Quando o painel AR abrir, reativamos os cliques na cena */
      #order-panel.show ~ #ar-scene {
        pointer-events: auto;
      }

      /* --- INTERFACE (MENUS) --- */
      #menu-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 100; /* Fica na frente de tudo */
        overflow-y: auto;
        transition: transform 0.4s ease, opacity 0.3s ease;
        transform: translateX(0);
        opacity: 1;
      }
      #menu-screen.hide {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none; /* Impede interações quando escondido */
      }

      .header {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        text-align: center;
        color: white;
      }
      .header h1 {
        font-size: 28px;
        margin-bottom: 10px;
      }
      .table-info {
        font-size: 18px;
        background: rgba(255, 255, 255, 0.2);
        display: inline-block;
        padding: 5px 20px;
        border-radius: 25px;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .product-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }
      .product-card:hover {
        transform: translateY(-5px);
      }
      .product-image {
        width: 100%;
        height: 200px;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
      }
      .product-info {
        padding: 15px;
      }
      .product-info h3 {
        font-size: 18px;
        margin-bottom: 8px;
        color: #333;
      }
      .product-info p {
        font-size: 14px;
        color: #666;
        margin-bottom: 10px;
      }
      .product-price {
        font-size: 22px;
        font-weight: bold;
        color: #4caf50;
      }
      .select-btn {
        width: 100%;
        padding: 12px;
        background: #4caf50;
        color: white;
        border: none;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
      }

      /* Botão Voltar */
      #back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        z-index: 200; /* Acima da cena 3D */
        backdrop-filter: blur(5px);
        display: none;
        font-weight: bold;
      }

      /* Painel de Pedido (AR) */
      #order-panel {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 15px;
        z-index: 200; /* Acima da cena 3D */
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }
      #order-panel.show {
        transform: translateY(0);
      }

      .product-info-ar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        color: white;
      }
      .product-name-ar {
        font-size: 18px;
        font-weight: bold;
      }
      .product-price-ar {
        font-size: 18px;
        color: #4caf50;
      }
      .order-controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .quantity-control {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.2);
        padding: 5px 15px;
        border-radius: 25px;
      }
      .qty-btn {
        background: white;
        color: #333;
        border: none;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        font-size: 20px;
        cursor: pointer;
        font-weight: bold;
      }
      #quantity {
        color: white;
        font-size: 18px;
        min-width: 35px;
        text-align: center;
        font-weight: bold;
      }
      .confirm-btn {
        flex: 1;
        background: #4caf50;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
      }

      /* Status e Instruções */
      .camera-status {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.6);
        color: #ff9800;
        padding: 5px 10px;
        border-radius: 8px;
        font-size: 11px;
        z-index: 200;
      }
      .config-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        border-radius: 10px;
        z-index: 300;
        display: flex;
        gap: 10px;
      }
      .config-panel input {
        padding: 8px;
        border-radius: 5px;
        border: none;
        width: 180px;
        font-size: 12px;
      }
      .config-panel button {
        padding: 8px 12px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <video id="video-background" autoplay playsinline muted></video>

    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      background="transparent: true"
      gesture-detector
    >
      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>
      
      <a-entity camera position="0 0 0"></a-entity>

      <a-entity
        id="ar-model"
        class="clickable"
        gesture-handler="enabled: true"
        position="0 0.5 -4" 
        scale="1 1 1"
        rotation="0 0 0"
      ></a-entity>
    </a-scene>

    <div class="config-panel">
      <input type="text" id="backend-url" placeholder="URL do Backend" value="http://localhost:3000" />
      <button id="save-url">Salvar</button>
    </div>

    <div id="menu-screen">
      <div class="header">
        <h1>🍽️ Cardápio 3D</h1>
        <div class="table-info">Mesa <span id="table-number">1</span></div>
      }
      <div id="product-list" class="product-grid">
        <div style="text-align: center; padding: 40px; color: white">Carregando...</div>
      </div>
    </div>

    <button id="back-btn">← Voltar</button>

    <div id="order-panel">
      <div class="product-info-ar">
        <span id="ar-product-name" class="product-name-ar">---</span>
        <span id="ar-product-price" class="product-price-ar">R$ --,--</span>
      }
      <div class="order-controls">
        <div class="quantity-control">
          <button id="decrease-qty" class="qty-btn">-</button>
          <span id="quantity">1</span>
          <button id="increase-qty" class="qty-btn">+</button>
        </div>
        <button id="confirm-order" class="confirm-btn">📝 Fazer Pedido</button>
      </div>
    </div>

    <div class="camera-status" id="camera-status">📷 Aguardando câmera...</div>

    <script>
      // ============================================
      // 1. DADOS E CONFIGURAÇÕES GLOBAIS
      // ============================================
      const products = [
        { id: 1, name: "Hambúrguer Artesanal", description: "Carne 180g, queijo, bacon", price: 32.9, modelFile: "hamburguer.glb", emoji: "🍔", color: "#ff9800", scale: "0.5 0.5 0.5", position: "0 0.5 -4" },
        { id: 2, name: "Pizza Margherita", description: "Mussarela, manjericão", price: 45.9, modelFile: "pizza.glb", emoji: "🍕", color: "#f44336", scale: "1 1 1", position: "0 0.2 -5" },
        { id: 3, name: "Refrigerante", description: "Coca-Cola 350ml", price: 7.5, modelFile: "soda.glb", emoji: "🥤", color: "#2196f3", scale: "0.8 0.8 0.8", position: "0 0.8 -3.5" },
      ];

      let currentProduct = null;
      let currentQuantity = 1;
      let BACKEND_URL = localStorage.getItem("backend_url") || "http://localhost:3000";

      // ============================================
      // 2. CONTROLADOR DA CÂMERA (CSS/HTML5)
      // ============================================
      async function setupCamera() {
        const video = document.getElementById('video-background');
        const status = document.getElementById("camera-status");
        
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, // Usa a câmera traseira
            audio: false 
          });
          video.srcObject = stream;
          status.textContent = "📷 Câmera Ativa • Arraste para girar o modelo";
          status.style.color = "#4CAF50";
        } catch (error) {
          console.error("Erro ao acessar a câmera:", error);
          status.textContent = "⚠️ Erro ao acessar câmera. Verifique permissões.";
          status.style.color = "#F44336";
        }
      }

      // ============================================
      // 3. CONTROLADOR 3D (ARController Unificado)
      // ============================================
      const ARController = {
        currentModelEntity: null,

        loadModel: (product) => {
          const modelParent = document.getElementById("ar-model");
          if (!modelParent) return;

          // Limpa modelo anterior
          while (modelParent.firstChild) {
            modelParent.removeChild(modelParent.firstChild);
          }

          if (!product.modelFile) {
            console.warn("Produto sem arquivo de modelo 3D");
            return;
          }

          const modelPath = `assets/models/${product.modelFile}`;
          console.log(`📦 Carregando modelo: ${modelPath}`);

          // Cria a nova entidade gltf
          const model = document.createElement("a-entity");
          model.setAttribute("gltf-model", `url(${modelPath})`);
          
          // Aplica escala e posição específicas do produto (definidas no array de dados)
          model.setAttribute("scale", product.scale || "1 1 1");
          model.setAttribute("position", product.position || "0 0.5 -4");
          model.setAttribute("class", "clickable"); // Para gestos

          // Rotação automática horizontal suave
          model.setAttribute("animation", {
            property: "rotation",
            to: "0 360 0",
            dur: 20000, // 20 segundos por volta
            easing: "linear",
            loop: true
          });

          // Eventos de carregamento
          model.addEventListener("model-loaded", () => {
            console.log(`✅ Modelo carregado: ${product.name}`);
          });

          model.addEventListener("model-error", (err) => {
            console.error("❌ Erro ao carregar modelo:", err);
            updateStatus(`⚠️ Falha ao carregar ${product.modelFile}`, true);
          });

          modelParent.appendChild(model);
          ARController.currentModelEntity = model;
        },

        reset: () => {
          const modelParent = document.getElementById("ar-model");
          if (modelParent) {
            while (modelParent.firstChild) {
              modelParent.removeChild(modelParent.firstChild);
            }
          }
          ARController.currentModelEntity = null;
          console.log("🔄 Cena 3D resetada");
        }
      };

      // ============================================
      // 4. FUNÇÕES DE INTERFACE (UI)
      // ============================================
      function updateStatus(msg, isError = false) {
        const status = document.getElementById("camera-status");
        status.textContent = msg;
        status.style.color = isError ? "#F44336" : "#ff9800";
      }

      function renderProducts() {
        const container = document.getElementById("product-list");
        container.innerHTML = "";

        products.forEach((p) => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <div class="product-image" style="background: ${p.color}20;">
              <span style="font-size:64px;">${p.emoji}</span>
            </div>
            <div class="product-info">
              <h3>${p.name}</h3>
              <p>${p.description}</p>
              <div class="product-price">R$ ${p.price.toFixed(2)}</div>
            </div>
            <button class="select-btn" data-id="${p.id}">🔍 Ver em 3D</button>
          `;
          card.querySelector(".select-btn").onclick = () => selectProduct(p.id);
          container.appendChild(card);
        });
      }

      function selectProduct(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;

        currentProduct = product;
        currentQuantity = 1;

        // 1. Atualiza UI
        document.getElementById("quantity").textContent = "1";
        document.getElementById("ar-product-name").textContent = product.name;
        document.getElementById("ar-product-price").textContent = `R$ ${product.price.toFixed(2)}`;

        // 2. Carrega o Modelo 3D via Controlador unificado
        ARController.loadModel(product);

        // 3. Troca de telas (CSS)
        document.getElementById("menu-screen").classList.add("hide");
        document.getElementById("back-btn").style.display = "block";
        document.getElementById("order-panel").classList.add("show");
      }

      function backToMenu() {
        // 1. Esconde painel 3D
        document.getElementById("menu-screen").classList.remove("hide");
        document.getElementById("back-btn").style.display = "none";
        document.getElementById("order-panel").classList.remove("show");

        // 2. Limpa o modelo para economizar memória
        ARController.reset();
      }

      // ============================================
      // 5. EVENTOS E INICIALIZAÇÃO
      // ============================================
      
      // Botões de Quantidade
      document.getElementById("decrease-qty").onclick = () => { if (currentQuantity > 1) currentQuantity--; document.getElementById("quantity").textContent = currentQuantity; };
      document.getElementById("increase-qty").onclick = () => { if (currentQuantity < 99) currentQuantity++; document.getElementById("quantity").textContent = currentQuantity; };
      
      // Navegação
      document.getElementById("back-btn").onclick = backToMenu;
      
      // Configuração Backend
      document.getElementById("save-url").onclick = () => {
        let url = document.getElementById("backend-url").value.trim().replace(/\/$/, "");
        BACKEND_URL = url;
        localStorage.setItem("backend_url", BACKEND_URL);
        alert(`Backend configurado: ${BACKEND_URL}`);
      };

      // INICIALIZAÇÃO AO CARREGAR PÁGINA
      window.addEventListener("load", () => {
        // Pega número da mesa da URL (?mesa=2)
        const urlParams = new URLSearchParams(window.location.search);
        let tableNumber = parseInt(urlParams.get("mesa")) || 1;
        document.getElementById("table-number").textContent = tableNumber;

        renderProducts(); // Cria a lista de produtos
        setupCamera();    // Ativa a câmera de fundo
      });
    </script>
  </body>
</html>
