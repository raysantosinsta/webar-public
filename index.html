<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Teste AR - Hambúrguer</title>
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    
    .info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      z-index: 100;
      font-size: 14px;
    }
    
    .status {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: #4CAF50;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      z-index: 100;
    }
    
    button {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      z-index: 100;
    }
  </style>
  
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <button onclick="location.reload()">🔄 Recarregar</button>
  <div class="status" id="status">🔍 Iniciando AR...</div>
  <div class="info">
    🍔 Aponte a câmera para o <strong>marcador HIRO</strong><br>
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank" style="color: #4CAF50;">📥 Baixar Marcador</a>
  </div>
  
  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
  >
    <a-entity camera></a-entity>
    
    <a-marker preset="hiro">
      <!-- Modelo Hambúrguer -->
      <a-entity
        id="model"
        gltf-model="url(/assets/models/hamburguer.glb)"
        scale="0.3 0.3 0.3"
        position="0 0 0"
        rotation="0 0 0"
      ></a-entity>
      
      <!-- Fallback: cubo vermelho -->
      <a-box color="#FF6B6B" width="0.5" height="0.5" depth="0.5" opacity="0.5"></a-box>
    </a-marker>
  </a-scene>
  
  <script>
    const statusDiv = document.getElementById('status');
    
    setTimeout(() => {
      const model = document.getElementById('model');
      if (model) {
        model.addEventListener('model-loaded', () => {
          statusDiv.innerHTML = '✅ Modelo carregado!';
          statusDiv.style.color = '#4CAF50';
          // Esconde o cubo fallback
          const fallback = document.querySelector('a-box');
          if (fallback) fallback.setAttribute('visible', 'false');
        });
        
        model.addEventListener('model-error', (e) => {
          statusDiv.innerHTML = '❌ Erro: modelo não encontrado!';
          statusDiv.style.color = '#F44336';
          console.error('Erro ao carregar modelo:', e);
        });
      }
    }, 1000);
    
    console.log('🚀 AR iniciado - Aponte para o marcador HIRO');
  </script>
</body>
</html>
