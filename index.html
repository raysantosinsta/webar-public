<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Teste AR Simples</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    
    .info {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      z-index: 100;
      font-size: 14px;
    }
    
    .info a {
      color: #4CAF50;
    }
    
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: black;
      color: white;
      padding: 20px;
      border-radius: 10px;
      z-index: 200;
      text-align: center;
    }
    
    button {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      z-index: 100;
      cursor: pointer;
      font-size: 14px;
    }
    
    button:hover {
      background: #45a049;
    }
  </style>
  
  <!-- Bibliotecas -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.min.js"></script>
</head>
<body>
  <button onclick="location.reload()">🔄 Recarregar</button>
  
  <div class="info">
    📌 Aponte a câmera para o <strong>marcador HIRO</strong><br>
    Baixe o marcador: 
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">Clique aqui</a>
    <br>
    🍕 Modelo: Pizza
  </div>
  
  <div class="loading" id="loading">
    🔄 Carregando AR...
  </div>
  
  <!-- Cena AR SIMPLES -->
  <a-scene
    id="scene"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: true;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true"
  >
    <!-- Marcador HIRO -->
    <a-marker preset="hiro">
      <!-- MODELO 3D - TROQUE O CAMINHO AQUI -->
      <a-entity 
        id="modelo"
        gltf-model="url(/assets/models/pizza.glb)"
        scale="0.3 0.3 0.3"
        position="0 0 0"
        rotation="0 0 0"
      ></a-entity>
      
      <!-- UM CUBO COLORIDO DE FALLBACK (se o modelo não carregar) -->
      <a-box 
        color="#FF0000" 
        width="0.5" 
        height="0.5" 
        depth="0.5"
        position="0 0 0"
        opacity="0.7"
      ></a-box>
    </a-marker>
    
    <!-- Câmera -->
    <a-entity camera></a-entity>
    
    <!-- Luzes -->
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
  </a-scene>
  
  <script>
    // Esconde loading após alguns segundos
    setTimeout(() => {
      const loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    }, 3000);
    
    // Verifica se o modelo carregou
    const modelo = document.getElementById('modelo');
    if (modelo) {
      modelo.addEventListener('model-loaded', () => {
        console.log('✅ MODELO CARREGADO COM SUCESSO!');
        const loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      });
      
      modelo.addEventListener('model-error', (e) => {
        console.error('❌ ERRO AO CARREGAR MODELO:', e);
        const loading = document.getElementById('loading');
        if (loading) {
          loading.innerHTML = '❌ Erro ao carregar modelo GLB<br>Verifique o caminho do arquivo';
          loading.style.background = 'red';
        }
      });
    }
    
    console.log('🚀 Teste AR iniciado');
    console.log('📌 Aponte para o marcador HIRO');
    console.log('📦 Modelo esperado em: /assets/models/pizza.glb');
  </script>
</body>
</html>
