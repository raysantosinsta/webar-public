<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cardápio AR - Restaurante</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- Gestos -->
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
  <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }

    #menu-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 100; overflow-y: auto;
    }
    #menu-screen.hide { transform: translateX(-100%); }

    .header { background: rgba(0,0,0,0.3); padding: 20px; text-align: center; color: white; }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .table-info { font-size: 18px; background: rgba(255,255,255,0.2); padding: 5px 20px; border-radius: 25px; }

    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto;
    }
    .product-card {
      background: white; border-radius: 15px; overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
    }
    .product-image {
      height: 200px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 80px;
    }
    .select-btn {
      width: 100%; padding: 12px; background: #4caf50; color: white; border: none; font-size: 16px; cursor: pointer;
    }

    #back-btn {
      position: absolute; top: 20px; left: 20px; z-index: 200;
      background: rgba(0,0,0,0.7); color: white; border: none; padding: 12px 24px; border-radius: 30px; display: none;
    }

    #order-panel {
      position: absolute; bottom: 20px; left: 20px; right: 20px;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px;
      z-index: 200; transform: translateY(100%); transition: transform 0.3s ease;
    }
    #order-panel.show { transform: translateY(0); }

    .camera-status {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.6); color: #ff9800; padding: 5px 10px; border-radius: 8px; font-size: 11px; z-index: 200;
    }
  </style>
</head>
<body>

  <div id="menu-screen">
    <div class="header">
      <h1>🍽️ Cardápio AR</h1>
      <div class="table-info">Mesa <span id="table-number">1</span></div>
    </div>
    <div id="product-list" class="product-grid"></div>
  </div>

  <button id="back-btn">← Voltar ao Cardápio</button>

  <div id="order-panel">
    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: white;">
      <span id="ar-product-name" style="font-weight: bold;">---</span>
      <span id="ar-product-price" style="color: #4caf50;">R$ --,--</span>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
      <div style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 25px;">
        <button id="decrease-qty" style="width:35px; height:35px; border-radius:50%; border:none; background:white;">-</button>
        <span id="quantity" style="color:white; font-weight:bold; min-width:30px; text-align:center;">1</span>
        <button id="increase-qty" style="width:35px; height:35px; border-radius:50%; border:none; background:white;">+</button>
      </div>
      <button id="confirm-order" style="flex:1; background:#4caf50; color:white; border:none; padding:12px; border-radius:25px; font-weight:bold;">
        📝 Fazer Pedido
      </button>
    </div>
  </div>

  <div class="camera-status" id="camera-status">📷 Aguardando...</div>

  <!-- Cena A-Frame -->
  <a-scene 
    id="ar-scene" 
    embedded 
    vr-mode-ui="enabled: false" 
    background="color: #111111"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"
  >
    <a-entity camera position="0 0 0"></a-entity>

    <a-entity 
      id="ar-model" 
      gesture-handler="enabled: true"
    ></a-entity>

    <a-light type="ambient" intensity="1.0"></a-light>
    <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>
  </a-scene>

  <script>
    const products = [
      { id: 1, name: "Hambúrguer Artesanal", price: 32.9, modelFile: "hamburguer.glb" },
      { id: 2, name: "Pizza Margherita",     price: 45.9, modelFile: "pizza.glb" },
      { id: 3, name: "Refrigerante",         price: 7.5,  modelFile: "soda.glb" }
    ];

    let currentProduct = null;
    let currentQuantity = 1;
    let BACKEND_URL = localStorage.getItem("backend_url") || "http://localhost:3000";

    function updateStatus(msg) {
      document.getElementById("camera-status").textContent = msg;
    }

    function renderProducts() {
      const container = document.getElementById("product-list");
      container.innerHTML = "";

      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <div class="product-image">${p.name.includes("Hambúrguer") ? "🍔" : p.name.includes("Pizza") ? "🍕" : "🥤"}</div>
          <div style="padding:15px;">
            <h3>${p.name}</h3>
            <div style="font-size:22px; font-weight:bold; color:#4caf50;">R$ ${p.price.toFixed(2)}</div>
          </div>
          <button class="select-btn">🔍 Ver em 3D</button>
        `;
        card.querySelector(".select-btn").onclick = () => selectProduct(p.id);
        container.appendChild(card);
      });
    }

    function loadModel(modelFile) {
      const modelEntity = document.getElementById("ar-model");
      while (modelEntity.firstChild) modelEntity.removeChild(modelEntity.firstChild);

      const modelPath = `assets/models/${modelFile}`;
      console.log(`🔍 Carregando modelo: ${modelPath}`);

      const model = document.createElement("a-entity");
      model.setAttribute("gltf-model", `url(${modelPath})`);
      model.setAttribute("scale", "0.22 0.22 0.22");     // menor
      model.setAttribute("position", "0 0.2 -1.0");

      // Rotação automática horizontal infinita
      model.setAttribute("animation", {
        property: "rotation",
        to: "0 360 0",
        dur: 16000,           // 16 segundos por volta
        easing: "linear",
        loop: true
      });

      model.addEventListener("model-loaded", () => {
        console.log("✅ Modelo carregado com sucesso!");
        updateStatus(`✅ ${currentProduct?.name} carregado`);
      });

      model.addEventListener("model-error", () => {
        console.error("❌ Erro ao carregar o modelo");
        updateStatus("⚠️ Erro ao carregar modelo", true);
      });

      modelEntity.appendChild(model);
    }

    function selectProduct(id) {
      currentProduct = products.find(p => p.id === id);
      if (!currentProduct) return;

      currentQuantity = 1;
      document.getElementById("quantity").textContent = "1";
      document.getElementById("ar-product-name").textContent = currentProduct.name;
      document.getElementById("ar-product-price").textContent = `R$ ${currentProduct.price.toFixed(2)}`;

      loadModel(currentProduct.modelFile);

      // Troca de tela
      document.getElementById("menu-screen").classList.add("hide");
      document.getElementById("back-btn").style.display = "block";
      document.getElementById("order-panel").classList.add("show");

      updateStatus("✅ Carregando modelo...");
    }

    function backToMenu() {
      document.getElementById("menu-screen").classList.remove("hide");
      document.getElementById("back-btn").style.display = "none";
      document.getElementById("order-panel").classList.remove("show");
      updateStatus("📱 Cardápio");
    }

    // Eventos
    document.getElementById("back-btn").onclick = backToMenu;

    document.getElementById("decrease-qty").onclick = () => {
      if (currentQuantity > 1) currentQuantity--;
      document.getElementById("quantity").textContent = currentQuantity;
    };

    document.getElementById("increase-qty").onclick = () => {
      if (currentQuantity < 99) currentQuantity++;
      document.getElementById("quantity").textContent = currentQuantity;
    };

    document.getElementById("confirm-order").onclick = () => {
      if (!currentProduct) return;
      alert(`✅ Pedido de ${currentQuantity}x ${currentProduct.name} enviado para a mesa!`);
      backToMenu();
    };

    // Inicialização
    renderProducts();
    updateStatus("📱 Toque em um produto para começar");

    // Atualiza número da mesa da URL
    window.addEventListener("load", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const mesa = parseInt(urlParams.get("mesa")) || 1;
      document.getElementById("table-number").textContent = mesa;
    });
  </script>
</body>
</html>
