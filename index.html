<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Gourmet AR - Cardápio Interativo 3D</title>

    <!-- Preconnect para carregamento mais rápido -->
    <link rel="preconnect" href="https://aframe.io" />
    <link rel="preconnect" href="https://raw.githack.com" />
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Google Fonts Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    
    <!-- Socket.io Client -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      
      body {
        margin: 0;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        background-color: #0a0a0a;
      }
      
      /* Video Background */
      #video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
        filter: brightness(0.95);
      }
      
      /* AR Scene */
      #ar-scene {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: auto;
      }
      
      /* Menu Screen */
      #menu-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(145deg, rgba(15, 25, 35, 0.95) 0%, rgba(10, 18, 25, 0.98) 100%);
        backdrop-filter: blur(20px);
        z-index: 100;
        overflow-y: auto;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(0);
      }
      
      #menu-screen.hide {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }
      
      /* Custom Scrollbar */
      #menu-screen::-webkit-scrollbar {
        width: 5px;
      }
      
      #menu-screen::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      
      #menu-screen::-webkit-scrollbar-thumb {
        background: #ff6b35;
        border-radius: 10px;
      }
      
      /* Header Premium */
      .header {
        background: linear-gradient(135deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.4) 100%);
        backdrop-filter: blur(10px);
        padding: 30px 20px;
        text-align: center;
        color: white;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      
      .header h1 {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #fff 0%, #ff6b35 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .table-info {
        font-size: 14px;
        background: rgba(255, 107, 53, 0.2);
        backdrop-filter: blur(5px);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        border-radius: 40px;
        margin-top: 12px;
        border: 1px solid rgba(255, 107, 53, 0.3);
      }
      
      .table-info i {
        font-size: 14px;
        color: #ff6b35;
      }
      
      /* Connection Status */
      #connection-status {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        padding: 8px 16px;
        border-radius: 40px;
        font-size: 12px;
        z-index: 300;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      #connection-status i {
        font-size: 10px;
      }
      
      #connection-status.connected {
        color: #4caf50;
        border-color: rgba(76, 175, 80, 0.3);
      }
      
      #connection-status.disconnected {
        color: #f44336;
        border-color: rgba(244, 67, 54, 0.3);
      }
      
      #connection-status.connecting {
        color: #ff9800;
        border-color: rgba(255, 152, 0, 0.3);
      }
      
      /* Notification Styles */
      .order-notification {
        position: fixed;
        top: 80px;
        right: 20px;
        left: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        transform: translateX(120%);
        transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        cursor: pointer;
      }
      
      .order-notification.show {
        transform: translateX(0);
      }
      
      .notification-content {
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        color: white;
      }
      
      .notification-icon {
        font-size: 48px;
        animation: bounce 0.5s ease;
      }
      
      .notification-text {
        flex: 1;
      }
      
      .notification-text h4 {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      
      .notification-text p {
        font-size: 14px;
        opacity: 0.9;
      }
      
      .notification-close {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 20px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      
      .notification-close:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }
      
      @keyframes bounce {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); }
      }
      
      /* Toast Message */
      .toast-message {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 500;
        z-index: 10000;
        transition: transform 0.3s ease;
        white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      
      .toast-message.show {
        transform: translateX(-50%) translateY(0);
      }
      
      /* Product Grid */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        padding: 24px;
        max-width: 1400px;
        margin: 0 auto;
      }
      
      .product-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
      }
      
      .product-card:hover {
        transform: translateY(-8px) scale(1.02);
        border-color: rgba(255, 107, 53, 0.3);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }
      
      .product-image {
        width: 100%;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }
      
      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
      }
      
      .product-card:hover .product-image img {
        transform: scale(1.05);
      }
      
      .product-info {
        padding: 20px;
      }
      
      .product-info h3 {
        font-size: 20px;
        font-weight: 600;
        color: white;
        margin-bottom: 8px;
      }
      
      .product-description {
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        line-height: 1.4;
        margin-bottom: 12px;
      }
      
      .product-price {
        font-size: 24px;
        font-weight: 700;
        color: #ff6b35;
        margin: 12px 0;
      }
      
      .select-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        color: white;
        border: none;
        font-weight: 600;
        cursor: pointer;
        font-size: 15px;
        border-radius: 40px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      
      .select-btn:active {
        transform: scale(0.98);
      }
      
      /* Back Button */
      #back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 20px;
        border-radius: 40px;
        z-index: 200;
        display: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s;
        gap: 8px;
        align-items: center;
      }
      
      #back-btn:active {
        transform: translateX(-5px);
        background: rgba(255, 107, 53, 0.9);
      }
      
      /* Order Panel */
      #order-panel {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(20px);
        border-radius: 32px;
        padding: 24px;
        z-index: 200;
        transform: translateY(150%);
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      #order-panel.show {
        transform: translateY(0);
      }
      
      .product-info-ar {
        display: flex;
        justify-content: space-between;
        color: white;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      #ar-product-name {
        font-size: 20px;
        font-weight: 600;
      }
      
      #ar-product-price {
        font-size: 22px;
        font-weight: 700;
        color: #ff6b35;
      }
      
      .order-controls {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      
      .quantity-control {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.1);
        padding: 8px 20px;
        border-radius: 50px;
        color: white;
      }
      
      .qty-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        font-weight: bold;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 20px;
        transition: all 0.2s;
      }
      
      .qty-btn:active {
        transform: scale(0.95);
        background: #ff6b35;
      }
      
      .confirm-btn {
        flex: 1;
        padding: 14px;
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.3s;
      }
      
      .confirm-btn:active {
        transform: scale(0.98);
      }
      
      /* Info Panel */
      #info-panel {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(20px);
        border-radius: 28px;
        padding: 20px;
        z-index: 180;
        transform: translateY(150%);
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-height: 40vh;
        overflow-y: auto;
      }
      
      #info-panel.show {
        transform: translateY(0);
      }
      
      .info-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      }
      
      .info-header i {
        font-size: 24px;
        color: #ff6b35;
      }
      
      .info-header h3 {
        font-size: 18px;
        font-weight: 600;
        color: white;
        margin: 0;
      }
      
      .ingredients-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }
      
      .ingredient-tag {
        background: rgba(255, 107, 53, 0.15);
        border: 1px solid rgba(255, 107, 53, 0.3);
        border-radius: 40px;
        padding: 6px 14px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.9);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      
      .info-description {
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 16px;
      }
      
      .close-info {
        position: absolute;
        top: 16px;
        right: 20px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.5);
        font-size: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      /* Cart Button */
      #cart-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        color: white;
        border: none;
        padding: 16px 28px;
        border-radius: 60px;
        font-weight: 600;
        z-index: 150;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        display: none;
        font-size: 15px;
        gap: 10px;
        align-items: center;
        transition: all 0.3s;
      }
      
      #cart-btn:active {
        transform: scale(0.98);
      }
      
      /* Cart Screen */
      #cart-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 18, 25, 0.98);
        backdrop-filter: blur(20px);
        z-index: 500;
        display: none;
        flex-direction: column;
        animation: fadeIn 0.3s ease;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      .cart-header {
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        padding: 28px 24px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .cart-header h2 {
        font-size: 24px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }
      
      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .cart-item-info h4 {
        color: white;
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 5px;
      }
      
      .cart-item-info p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
      }
      
      .cart-item-actions {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      
      .cart-item-quantity {
        color: white;
        font-size: 18px;
        font-weight: 600;
      }
      
      .remove-item-btn {
        background: rgba(255, 82, 82, 0.2);
        border: 1px solid rgba(255, 82, 82, 0.3);
        color: #ff5252;
        padding: 8px 16px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 13px;
      }
      
      .cart-footer {
        padding: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.3);
      }
      
      .total-price {
        font-size: 28px;
        font-weight: 700;
        text-align: right;
        margin-bottom: 20px;
        color: #ff6b35;
      }
      
      .send-order-btn {
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        color: white;
        border: none;
        border-radius: 60px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
      }
      
      .close-cart {
        background: none;
        border: none;
        color: white;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        width: 44px;
        height: 44px;
        border-radius: 50%;
      }
      
      /* Status Indicators */
      .camera-status {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        padding: 8px 16px;
        border-radius: 40px;
        font-size: 12px;
        z-index: 200;
        font-weight: 500;
        color: #ff6b35;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .instruction {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        color: white;
        padding: 10px 20px;
        border-radius: 40px;
        z-index: 150;
        font-size: 13px;
        pointer-events: none;
        white-space: nowrap;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .gesture-instruction {
        position: fixed;
        bottom: 90px;
        left: 20px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        color: rgba(255, 255, 255, 0.9);
        padding: 10px 16px;
        border-radius: 40px;
        font-size: 11px;
        z-index: 150;
        pointer-events: none;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .config-panel {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 300;
        display: flex;
        gap: 5px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        padding: 5px;
        border-radius: 40px;
      }
      
      .config-panel input {
        padding: 8px 12px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 11px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        width: 140px;
      }
      
      .config-panel button {
        padding: 8px 16px;
        border-radius: 30px;
        border: none;
        background: #ff6b35;
        color: white;
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
      }
      
      @media (max-width: 768px) {
        .product-grid {
          grid-template-columns: 1fr;
          gap: 16px;
          padding: 16px;
        }
        
        .header h1 {
          font-size: 24px;
        }
        
        .gesture-instruction {
          bottom: 80px;
          font-size: 10px;
        }
        
        .instruction {
          font-size: 11px;
        }
        
        #info-panel {
          max-height: 35vh;
          padding: 16px;
        }
        
        .order-notification {
          top: 70px;
          left: 16px;
          right: 16px;
        }
        
        .notification-content {
          padding: 16px;
        }
        
        .notification-icon {
          font-size: 36px;
        }
      }
    </style>
  </head>
  <body>
    <video id="video-background" autoplay playsinline muted></video>

    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      background="transparent: true"
      gesture-detector
      performance="minPixelRatio: 0.5"
    >
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="0.7" position="1 2 1"></a-light>
      <a-light type="point" intensity="0.4" position="0 2 0"></a-light>

      <a-entity camera position="0 0 0">
        <a-entity
          cursor="rayOrigin: mouse"
          raycaster="objects: .clickable"
        ></a-entity>
      </a-entity>

      <a-entity id="ar-model-container" position="0 0.5 -4" gesture-handler>
        <a-entity id="ar-model" class="clickable"></a-entity>
      </a-entity>
    </a-scene>

    <div class="config-panel">
      <input type="text" id="backend-url" placeholder="URL Backend" value="http://192.168.30.106:3000" />
      <button onclick="saveUrl()"><i class="fas fa-save"></i></button>
    </div>

    <div id="menu-screen">
      <div class="header">
        <h1><i class="fas fa-utensils"></i> Gourmet AR</h1>
        <div class="table-info">
          <i class="fas fa-chair"></i>
          Mesa <span id="table-number">1</span>
        </div>
      </div>
      <div id="product-list" class="product-grid"></div>
    </div>

    <div id="connection-status" class="connecting">
      <i class="fas fa-circle"></i>
      <span>Conectando...</span>
    </div>

    <button id="cart-btn" onclick="openCart()">
      <i class="fas fa-shopping-bag"></i>
      Ver Pedido (<span id="cart-count">0</span>)
    </button>

    <div id="cart-screen">
      <div class="cart-header">
        <h2><i class="fas fa-shopping-bag"></i> Seu Pedido</h2>
        <button class="close-cart" onclick="closeCart()">✕</button>
      </div>
      <div id="cart-items-container" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total-price">
          Total: <span id="cart-total-value">R$ 0,00</span>
        </div>
        <button class="send-order-btn" onclick="sendFullOrder()">
          <i class="fas fa-paper-plane"></i> Enviar Pedido para Cozinha
        </button>
      </div>
    </div>

    <button id="back-btn" onclick="backToMenu()">
      <i class="fas fa-arrow-left"></i> Voltar
    </button>

    <div id="order-panel">
      <div class="product-info-ar">
        <span id="ar-product-name">---</span>
        <span id="ar-product-price">R$ 0,00</span>
      </div>
      <div class="order-controls">
        <div class="quantity-control">
          <button class="qty-btn" onclick="updateQty(-1)">-</button>
          <span id="quantity" style="font-weight: bold; font-size: 18px">1</span>
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        <button id="confirm-order" class="confirm-btn">
          <i class="fas fa-cart-plus"></i> Adicionar ao Pedido
        </button>
      </div>
    </div>

    <div id="info-panel">
      <button class="close-info" onclick="closeInfoPanel()">
        <i class="fas fa-times"></i>
      </button>
      <div class="info-header">
        <i class="fas fa-info-circle"></i>
        <h3>Informações do Produto</h3>
      </div>
      <div id="info-content"></div>
    </div>

    <div class="camera-status" id="camera-status">
      <i class="fas fa-camera"></i> Aguardando câmera...
    </div>
    <div class="instruction">
      <i class="fas fa-hand-peace"></i> Toque no modelo para pausar/rodar animação
    </div>
    <div class="gesture-instruction">
      <i class="fas fa-hand-peace"></i> 1 dedo: move | 2 dedos: gira/pinça
    </div>

    <script>
      // Produtos
      const products = [
        {
          id: 1,
          name: "Hambúrguer Artesanal",
          description: "Delicioso hambúrguer artesanal preparado com ingredientes selecionados",
          price: 32.9,
          modelFile: "hamburguer.glb",
          image: "https://viagem.cnnbrasil.com.br/wp-content/uploads/sites/5/2022/05/origem-do-hambuguer-cnn4.jpg?w=1200&h=900&crop=1",
          color: "#ff9800",
          scale: "0.25 0.25 0.25",
          position: "0 0.6 0",
          ingredients: [
            "Carne Angus 180g",
            "Queijo Cheddar",
            "Bacon Crocante",
            "Alface Americana",
            "Tomate",
            "Cebola Roxa",
            "Pão Brioche",
            "Molho Especial"
          ],
          nutrition: {
            calories: "520 kcal",
            protein: "32g",
            carbs: "45g",
            fat: "28g"
          }
        },
        {
          id: 2,
          name: "Pizza Margherita",
          description: "Pizza tradicional italiana com ingredientes frescos",
          price: 45.9,
          modelFile: "pizza.glb",
          image: "https://images.aws.nestle.recipes/original/1821a30a8a8acec9f74a1372be582610_sem_t%C3%ADtulo_(18).jpg",
          color: "#f44336",
          scale: "10 10 10",
          position: "0 0 0",
          ingredients: [
            "Massa Fininha",
            "Molho de Tomate",
            "Mussarela de Búfala",
            "Manjericão Fresco",
            "Azeite Extra Virgem",
            "Tomate Cereja",
            "Orégano"
          ],
          nutrition: {
            calories: "780 kcal",
            protein: "32g",
            carbs: "95g",
            fat: "28g"
          }
        },
        {
          id: 3,
          name: "Refrigerante",
          description: "Coca-Cola 350ml - Bem gelada",
          price: 7.5,
          modelFile: "coca.glb",
          image: "https://s3.amazonaws.com/lepok.w/produtos/produtos/26244.webp",
          color: "#2196f3",
          scale: "0.25 0.25 0.25",
          position: "0 -0.2 0",
          ingredients: [
            "Água Gaseificada",
            "Açúcar",
            "Extrato de Cola",
            "Cafeína",
            "Corante Caramelo"
          ],
          nutrition: {
            calories: "140 kcal",
            protein: "0g",
            carbs: "39g",
            fat: "0g"
          }
        }
      ];

      let cart = [];
      let currentProduct = null;
      let currentQuantity = 1;
      let BACKEND_URL = "http://192.168.30.106:3000";
      let currentModel = null;
      let isRotating = true;
      let socket = null;
      let currentTableNumber = 1;

      document.getElementById("backend-url").value = BACKEND_URL;

      const savedUrl = localStorage.getItem("backend_url");
      if (savedUrl) {
        BACKEND_URL = savedUrl;
        document.getElementById("backend-url").value = savedUrl;
      }

      // ============================================
      // WEBSOCKET FUNCTIONS
      // ============================================
      
      function showToast(message, color = "#4CAF50") {
        let toast = document.getElementById("toast-message");
        if (!toast) {
          toast = document.createElement("div");
          toast.id = "toast-message";
          toast.className = "toast-message";
          document.body.appendChild(toast);
        }
        
        toast.textContent = message;
        toast.style.backgroundColor = color;
        toast.classList.add("show");
        
        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }
      
      function showOrderNotification(productName) {
        let notification = document.getElementById("order-notification");
        
        if (!notification) {
          notification = document.createElement("div");
          notification.id = "order-notification";
          notification.className = "order-notification";
          notification.innerHTML = `
            <div class="notification-content">
              <div class="notification-icon">🎉</div>
              <div class="notification-text">
                <h4>Pedido Pronto!</h4>
                <p>Seu pedido está pronto para retirada</p>
              </div>
              <button class="notification-close">×</button>
            </div>
          `;
          document.body.appendChild(notification);
          
          const closeBtn = notification.querySelector(".notification-close");
          closeBtn.addEventListener("click", () => {
            notification.classList.remove("show");
          });
          
          notification.addEventListener("click", (e) => {
            if (e.target !== closeBtn) {
              notification.classList.remove("show");
              showToast("🎉 Aproveite sua refeição!", "#4CAF50");
            }
          });
        }
        
        const textDiv = notification.querySelector(".notification-text");
        textDiv.innerHTML = `
          <h4>🍕 Pedido Pronto!</h4>
          <p>Seu ${productName} está pronto para retirada</p>
        `;
        
        notification.classList.add("show");
        
        // Tocar som de notificação
        try {
          const audio = new Audio("/sounds/notification.mp3");
          audio.volume = 0.5;
          audio.play().catch(e => console.log("Som bloqueado:", e));
        } catch(e) {
          console.log("Erro ao tocar som:", e);
        }
        
        // Vibração (se disponível)
        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200]);
        }
        
        // Auto-esconder após 8 segundos
        setTimeout(() => {
          if (notification.classList.contains("show")) {
            notification.classList.remove("show");
          }
        }, 8000);
      }
      
      function updateConnectionStatus(status, message) {
        const statusDiv = document.getElementById("connection-status");
        statusDiv.className = status;
        statusDiv.innerHTML = `
          <i class="fas fa-circle"></i>
          <span>${message}</span>
        `;
      }
      
      function connectWebSocket(tableNumber) {
        if (socket) {
          socket.disconnect();
        }
        
        const wsUrl = BACKEND_URL;
        updateConnectionStatus("connecting", "Conectando...");
        
        try {
          socket = io(wsUrl, {
            query: { tableNumber: tableNumber, type: "customer" },
            transports: ["websocket", "polling"],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 2000
          });
          
          socket.on("connect", () => {
            console.log("✅ WebSocket conectado como mesa", tableNumber);
            updateConnectionStatus("connected", "Conectado");
            
            socket.emit("join-table", { tableNumber });
          });
          
          socket.on("connect_error", (error) => {
            console.error("❌ Erro de conexão WebSocket:", error);
            updateConnectionStatus("disconnected", "Falha na conexão");
          });
          
          socket.on("disconnect", (reason) => {
            console.log("❌ WebSocket desconectado:", reason);
            updateConnectionStatus("disconnected", "Desconectado");
          });
          
          socket.on("order-confirmed", (data) => {
            console.log("✅ Pedido confirmado:", data);
            showToast(`✅ Pedido recebido pela cozinha!`, "#4CAF50");
          });
          
          socket.on("order-ready", (data) => {
            console.log("🎉 Pedido pronto:", data);
            showOrderNotification(data.productName);
          });
          
          socket.on("order-updated", (data) => {
            console.log("📦 Status atualizado:", data);
            if (data.status === "preparing") {
              showToast("👨‍🍳 Seu pedido está sendo preparado!", "#FF9800");
            }
          });
          
        } catch (error) {
          console.error("Erro ao criar conexão WebSocket:", error);
          updateConnectionStatus("disconnected", "Erro de conexão");
        }
      }
      
      function disconnectWebSocket() {
        if (socket) {
          socket.disconnect();
          socket = null;
        }
      }
      
      // ============================================
      // APP FUNCTIONS
      // ============================================
      
      async function setupCamera() {
        const video = document.getElementById("video-background");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
          });
          video.srcObject = stream;
          document.getElementById("camera-status").innerHTML = '<i class="fas fa-camera"></i> Câmera Ativa';
          document.getElementById("camera-status").style.color = "#ff6b35";
        } catch (e) {
          document.getElementById("camera-status").innerHTML = '<i class="fas fa-exclamation-triangle"></i> Erro na câmera';
          console.error("Erro ao acessar câmera:", e);
        }
      }

      function renderProducts() {
        const container = document.getElementById("product-list");
        container.innerHTML = "";
        products.forEach((p) => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <div class="product-image">
              <img src="${p.image}" alt="${p.name}" loading="lazy" />
            </div>
            <div class="product-info">
              <h3>${p.name}</h3>
              <p class="product-description">${p.description}</p>
              <div class="product-price">R$ ${p.price.toFixed(2)}</div>
              <button class="select-btn" onclick="selectProduct(${p.id})">
                <i class="fas fa-cube"></i> Ver em 3D
              </button>
            </div>
          `;
          container.appendChild(card);
        });
      }

      function showProductInfo(product) {
        const infoContent = document.getElementById("info-content");
        
        const ingredientsHtml = product.ingredients.map(ing => `
          <span class="ingredient-tag">
            <i class="fas fa-check-circle"></i> ${ing}
          </span>
        `).join('');
        
        const nutritionHtml = product.nutrition ? `
          <div class="info-nutrition">
            <div class="nutrition-item">
              <span><i class="fas fa-fire"></i> Calorias</span>
              <span>${product.nutrition.calories}</span>
            </div>
            <div class="nutrition-item">
              <span><i class="fas fa-dumbbell"></i> Proteínas</span>
              <span>${product.nutrition.protein}</span>
            </div>
            <div class="nutrition-item">
              <span><i class="fas fa-bread-slice"></i> Carboidratos</span>
              <span>${product.nutrition.carbs}</span>
            </div>
            <div class="nutrition-item">
              <span><i class="fas fa-oil-can"></i> Gorduras</span>
              <span>${product.nutrition.fat}</span>
            </div>
          </div>
        ` : '';
        
        infoContent.innerHTML = `
          <div class="info-description">
            <i class="fas fa-align-left"></i> ${product.description}
          </div>
          <div class="info-header" style="margin-top: 8px;">
            <i class="fas fa-leaf"></i>
            <h3 style="font-size: 16px;">Ingredientes</h3>
          </div>
          <div class="ingredients-list">
            ${ingredientsHtml}
          </div>
          ${nutritionHtml}
        `;
        
        document.getElementById("info-panel").classList.add("show");
      }
      
      function closeInfoPanel() {
        document.getElementById("info-panel").classList.remove("show");
      }

      window.selectProduct = function(id) {
        const product = products.find((p) => p.id === id);
        if (!product) return;
        
        currentProduct = product;
        currentQuantity = 1;
        document.getElementById("quantity").textContent = "1";
        document.getElementById("ar-product-name").innerHTML = `<i class="fas fa-cube"></i> ${product.name}`;
        document.getElementById("ar-product-price").textContent = `R$ ${product.price.toFixed(2)}`;

        const modelContainer = document.getElementById("ar-model");
        modelContainer.innerHTML = "";
        
        const model = document.createElement("a-entity");
        model.setAttribute("gltf-model", `url(assets/models/${product.modelFile})`);
        model.setAttribute("scale", product.scale);
        model.setAttribute("position", product.position || "0 0 0");
        model.setAttribute("class", "clickable");
        
        model.setAttribute("animation", {
          property: "rotation",
          to: "0 360 0",
          dur: 15000,
          easing: "linear",
          loop: true,
          enabled: true
        });
        
        model.addEventListener("click", function(e) {
          e.stopPropagation();
          const anim = model.getAttribute("animation");
          if (anim && anim.enabled) {
            model.setAttribute("animation", "enabled", false);
            isRotating = false;
          } else {
            model.setAttribute("animation", "enabled", true);
            isRotating = true;
          }
        });
        
        modelContainer.appendChild(model);
        currentModel = model;

        const container = document.getElementById("ar-model-container");
        container.setAttribute("position", "0 0.5 -4");
        container.setAttribute("rotation", "0 0 0");
        container.setAttribute("scale", "1 1 1");

        document.getElementById("menu-screen").classList.add("hide");
        document.getElementById("back-btn").style.display = "flex";
        document.getElementById("order-panel").classList.add("show");
        
        showProductInfo(product);
      };

      window.addToCart = function() {
        if (!currentProduct) return;
        
        const existingItem = cart.find((item) => item.id === currentProduct.id);
        if (existingItem) {
          existingItem.quantity += currentQuantity;
        } else {
          cart.push({
            id: currentProduct.id,
            name: currentProduct.name,
            price: currentProduct.price,
            quantity: currentQuantity,
          });
        }
        
        updateCartButton();
        backToMenu();
        
        if (navigator.vibrate) navigator.vibrate(50);
        showToast(`✅ ${currentQuantity}x ${currentProduct.name} adicionado!`, "#4CAF50");
      };

      function updateCartButton() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const btn = document.getElementById("cart-btn");
        document.getElementById("cart-count").textContent = totalItems;
        btn.style.display = totalItems > 0 ? "flex" : "none";
      }

      window.openCart = function() {
        renderCartItems();
        document.getElementById("cart-screen").style.display = "flex";
      };

      window.closeCart = function() {
        document.getElementById("cart-screen").style.display = "none";
      };

      function renderCartItems() {
        const container = document.getElementById("cart-items-container");
        container.innerHTML = "";
        let total = 0;
        
        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `
            <div class="cart-item-info">
              <h4>${item.name}</h4>
              <p>R$ ${item.price.toFixed(2)} un.</p>
            </div>
            <div class="cart-item-actions">
              <span class="cart-item-quantity">${item.quantity}x</span>
              <button class="remove-item-btn" onclick="removeFromCart(${index})">
                <i class="fas fa-trash"></i> Remover
              </button>
            </div>
          `;
          container.appendChild(div);
        });
        
        document.getElementById("cart-total-value").textContent = `R$ ${total.toFixed(2)}`;
        if (cart.length === 0) {
          container.innerHTML = "<p style='text-align:center; color:rgba(255,255,255,0.5); padding:40px;'><i class='fas fa-shopping-bag'></i> Seu carrinho está vazio.</p>";
        }
      }

      window.removeFromCart = function(index) {
        cart.splice(index, 1);
        renderCartItems();
        updateCartButton();
        if (cart.length === 0) closeCart();
        if (navigator.vibrate) navigator.vibrate(30);
      };

      window.sendFullOrder = async function() {
        if (cart.length === 0) return;
        
        const btn = document.querySelector("#cart-screen .send-order-btn");
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
        
        const urlParams = new URLSearchParams(window.location.search);
        const tableNum = parseInt(urlParams.get("mesa")) || 1;
        const cleanUrl = BACKEND_URL.endsWith("/") ? BACKEND_URL.slice(0, -1) : BACKEND_URL;
        
        try {
          const promises = cart.map((item) => {
            const orderData = {
              tableNumber: tableNum,
              productId: String(item.id),
              productName: item.name,
              productPrice: item.price,
              quantity: item.quantity,
              status: "pending",
              observation: "",
            };
            return fetch(`${cleanUrl}/api/orders`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(orderData),
            });
          });
          
          const results = await Promise.all(promises);
          const allOk = results.every((res) => res.ok);
          
          if (allOk) {
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            cart = [];
            updateCartButton();
            closeCart();
            backToMenu();
            showToast("✅ Pedido enviado com sucesso!", "#4CAF50");
          } else {
            showToast("⚠️ Alguns itens não foram enviados.", "#F44336");
          }
        } catch (e) {
          console.error("Erro ao enviar pedido:", e);
          showToast("❌ Erro de conexão! Verifique sua internet.", "#F44336");
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalText;
        }
      };

      window.updateQty = function(val) {
        currentQuantity = Math.max(1, currentQuantity + val);
        document.getElementById("quantity").textContent = currentQuantity;
        if (navigator.vibrate) navigator.vibrate(20);
      };

      window.backToMenu = function() {
        document.getElementById("menu-screen").classList.remove("hide");
        document.getElementById("back-btn").style.display = "none";
        document.getElementById("order-panel").classList.remove("show");
        document.getElementById("ar-model").innerHTML = "";
        closeInfoPanel();
      };

      window.saveUrl = function() {
        BACKEND_URL = document.getElementById("backend-url").value;
        localStorage.setItem("backend_url", BACKEND_URL);
        showToast("URL salva! Reconectando...", "#4CAF50");
        
        const urlParams = new URLSearchParams(window.location.search);
        const tableNum = parseInt(urlParams.get("mesa")) || 1;
        connectWebSocket(tableNum);
      };

      window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        currentTableNumber = parseInt(urlParams.get("mesa")) || 1;
        document.getElementById("table-number").textContent = currentTableNumber;
        document.getElementById("confirm-order").onclick = addToCart;
        renderProducts();
        setupCamera();
        
        connectWebSocket(currentTableNumber);
        
        console.log("🚀 Gourmet AR iniciado!");
        console.log(`📱 Mesa ${currentTableNumber} conectada`);
        console.log("🎯 Aguardando notificações de pedido pronto...");
      };
    </script>
  </body>
</html>
