<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cardápio 3D - Restaurante com Gestos</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- Gesture support para AR.js (pinch zoom + rotate) -->
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>
    
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      
      /* A cena AR ocupa toda a tela */
      .ar-scene {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      
      /* Elementos de UI */
      #menu-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 100;
        overflow-y: auto;
        transition: 0.4s ease;
        transform: translateX(0);
      }
      
      #menu-screen.hide {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }
      
      .header {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        text-align: center;
        color: white;
      }
      
      .table-info {
        font-size: 18px;
        background: rgba(255, 255, 255, 0.2);
        display: inline-block;
        padding: 5px 20px;
        border-radius: 25px;
        margin-top: 10px;
      }
      
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        padding: 20px;
      }
      
      .product-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s;
        cursor: pointer;
      }
      
      .product-card:hover {
        transform: translateY(-5px);
      }
      
      .product-image {
        width: 100%;
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9f9;
        overflow: hidden;
      }
      
      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      
      .product-info {
        padding: 15px;
      }
      
      .product-price {
        font-size: 20px;
        font-weight: bold;
        color: #4caf50;
        margin: 10px 0;
      }
      
      .select-btn {
        width: 100%;
        padding: 12px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s;
      }
      
      .select-btn:hover {
        background: #45a049;
      }
      
      #back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 30px;
        z-index: 200;
        display: none;
        cursor: pointer;
        backdrop-filter: blur(5px);
        font-size: 16px;
      }
      
      #order-panel {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        z-index: 200;
        transform: translateY(150%);
        transition: 0.3s ease;
      }
      
      #order-panel.show {
        transform: translateY(0);
      }
      
      .product-info-ar {
        display: flex;
        justify-content: space-between;
        color: white;
        margin-bottom: 15px;
      }
      
      .order-controls {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      
      .quantity-control {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.1);
        padding: 5px 15px;
        border-radius: 25px;
        color: white;
      }
      
      .qty-btn {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        border: none;
        font-weight: bold;
        cursor: pointer;
        background: #ff9800;
        color: white;
        font-size: 18px;
      }
      
      .confirm-btn {
        flex: 1;
        padding: 15px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
      }
      
      .config-panel {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 300;
        display: flex;
        gap: 5px;
      }
      
      .config-panel input {
        padding: 8px;
        border-radius: 5px;
        border: none;
        font-size: 12px;
        background: rgba(0,0,0,0.7);
        color: white;
      }
      
      .config-panel button {
        padding: 8px 12px;
        border-radius: 5px;
        border: none;
        background: #4caf50;
        color: white;
        cursor: pointer;
      }
      
      #cart-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #ff9800;
        color: white;
        border: none;
        padding: 15px 25px;
        border-radius: 50px;
        font-weight: bold;
        z-index: 150;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        display: none;
        font-size: 16px;
      }
      
      #cart-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        z-index: 500;
        display: none;
        flex-direction: column;
      }
      
      .cart-header {
        background: #4caf50;
        padding: 20px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }
      
      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid #eee;
      }
      
      .cart-footer {
        padding: 20px;
        border-top: 2px solid #eee;
        background: #f9f9f9;
      }
      
      .total-price {
        font-size: 22px;
        font-weight: bold;
        text-align: right;
        margin-bottom: 15px;
      }
      
      .send-order-btn {
        width: 100%;
        padding: 18px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }
      
      .close-cart {
        background: none;
        border: none;
        color: white;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }
      
      .instruction {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 8px 16px;
        border-radius: 20px;
        z-index: 150;
        font-size: 12px;
        pointer-events: none;
        white-space: nowrap;
      }
      
      .gesture-overlay {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(0,0,0,0.6);
        color: #ff9800;
        padding: 8px 12px;
        border-radius: 20px;
        font-size: 12px;
        z-index: 150;
        pointer-events: none;
        font-weight: bold;
      }
      
      .ar-status {
        position: fixed;
        bottom: 10px;
        right: 10px;
        background: rgba(0,0,0,0.6);
        color: #ff9800;
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 11px;
        z-index: 150;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <!-- Cena AR.js - A câmera é gerenciada automaticamente pelo AR.js -->
    <a-scene
      id="ar-scene"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      gesture-detector
    >
      <!-- Câmera AR.js -->
      <a-entity camera></a-entity>
      
      <!-- Marcador HIRO - O modelo aparece sobre este marcador -->
      <a-marker id="ar-marker" preset="hiro">
        <!-- Container do modelo com suporte a gestos -->
        <a-entity
          id="ar-model-container"
          gesture-handler="enabled: true"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
        >
          <a-entity
            id="ar-model"
            class="clickable"
          ></a-entity>
        </a-entity>
      </a-marker>
      
      <!-- Luzes para iluminar o modelo -->
      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>
      <a-light type="point" intensity="0.5" position="0 2 0"></a-light>
    </a-scene>

    <div class="config-panel">
      <input
        type="text"
        id="backend-url"
        placeholder="URL Backend"
        value="http://192.168.30.106:3000/api"
      />
      <button onclick="saveUrl()">Salvar</button>
    </div>

    <div id="menu-screen">
      <div class="header">
        <h1>🍽️ Cardápio 3D</h1>
        <div class="table-info">Mesa <span id="table-number">1</span></div>
      </div>
      <div id="product-list" class="product-grid"></div>
    </div>

    <button id="cart-btn" onclick="openCart()">🛒 Ver Pedido (0)</button>

    <div id="cart-screen">
      <div class="cart-header">
        <h2>Seu Pedido</h2>
        <button class="close-cart" onclick="closeCart()">✕</button>
      </div>
      <div id="cart-items-container" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total-price">
          Total: <span id="cart-total-value">R$ 0,00</span>
        </div>
        <button class="send-order-btn" onclick="sendFullOrder()">
          🚀 Enviar Pedido para Cozinha
        </button>
      </div>
    </div>

    <button id="back-btn" onclick="backToMenu()">← Voltar ao Cardápio</button>

    <div id="order-panel">
      <div class="product-info-ar">
        <span id="ar-product-name" style="font-weight: bold; font-size: 18px">---</span>
        <span id="ar-product-price" style="color: #4caf50; font-size: 18px">R$ 0,00</span>
      </div>
      <div class="order-controls">
        <div class="quantity-control">
          <button class="qty-btn" onclick="updateQty(-1)">-</button>
          <span id="quantity" style="font-weight: bold; font-size: 18px">1</span>
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        <button id="confirm-order" class="confirm-btn">
          🛒 Adicionar ao Pedido
        </button>
      </div>
    </div>

    <div class="instruction">🎯 Aponte a câmera para o marcador HIRO</div>
    <div class="gesture-overlay">
      ✋ Gestos disponíveis:<br>
      • 1 dedo: Move o modelo<br>
      • 2 dedos girando: Rotaciona<br>
      • Pinça: Aumenta/diminui
    </div>
    <div class="ar-status" id="ar-status">📷 Iniciando AR...</div>

    <script>
      // Produtos
      const products = [
        {
          id: 1,
          name: "Hambúrguer Artesanal",
          description: "Carne 180g, queijo, bacon, alface e tomate",
          price: 32.90,
          modelFile: "hamburguer.glb",
          image: "https://viagem.cnnbrasil.com.br/wp-content/uploads/sites/5/2022/05/origem-do-hambuguer-cnn4.jpg?w=1200&h=900&crop=1",
          color: "#ff9800",
          scale: "0.8 0.8 0.8"
        },
        {
          id: 2,
          name: "Pizza Margherita",
          description: "Mussarela, manjericão, tomate e azeite",
          price: 45.90,
          modelFile: "pizza.glb",
          image: "https://images.aws.nestle.recipes/original/1821a30a8a8acec9f74a1372be582610_sem_t%C3%ADtulo_(18).jpg",
          color: "#f44336",
          scale: "1.2 1.2 1.2"
        },
        {
          id: 3,
          name: "Refrigerante",
          description: "Coca-Cola 350ml - Bem gelada",
          price: 7.50,
          modelFile: "coca.glb",
          image: "https://s3.amazonaws.com/lepok.w/produtos/produtos/26244.webp",
          color: "#2196f3",
          scale: "0.6 0.6 0.6"
        }
      ];

      let cart = [];
      let currentProduct = null;
      let currentQuantity = 1;
      let BACKEND_URL = "http://192.168.30.106:3000/api";
      let currentModel = null;
      let isRotating = true;
      let rotationInterval = null;
      
      document.getElementById("backend-url").value = BACKEND_URL;

      // Carregar URL salva
      const savedUrl = localStorage.getItem("backend_url");
      if (savedUrl) {
        BACKEND_URL = savedUrl;
        document.getElementById("backend-url").value = savedUrl;
      }

      // Renderizar produtos do cardápio
      function renderProducts() {
        const container = document.getElementById("product-list");
        container.innerHTML = "";
        products.forEach((p) => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <div class="product-image">
              <img src="${p.image}" alt="${p.name}" />
            </div>
            <div class="product-info">
              <h3>${p.name}</h3>
              <p style="color: #666; font-size: 14px; margin: 5px 0;">${p.description}</p>
              <div class="product-price">R$ ${p.price.toFixed(2)}</div>
              <button class="select-btn" onclick="selectProduct(${p.id})">🔍 Ver em Realidade Aumentada</button>
            </div>
          `;
          container.appendChild(card);
        });
      }

      // Selecionar produto
      window.selectProduct = function(id) {
        const product = products.find((p) => p.id === id);
        if (!product) return;
        
        currentProduct = product;
        currentQuantity = 1;
        document.getElementById("quantity").textContent = "1";
        document.getElementById("ar-product-name").textContent = product.name;
        document.getElementById("ar-product-price").textContent = `R$ ${product.price.toFixed(2)}`;
        
        // Limpar modelo anterior
        const modelContainer = document.getElementById("ar-model");
        modelContainer.innerHTML = "";
        
        // Criar novo modelo
        const model = document.createElement("a-entity");
        model.setAttribute(
          "gltf-model",
          `url(assets/models/${product.modelFile})`
        );
        model.setAttribute("scale", product.scale);
        model.setAttribute("class", "clickable");
        
        // Adicionar animação de rotação
        model.setAttribute("animation", {
          property: "rotation",
          to: "0 360 0",
          dur: 15000,
          easing: "linear",
          loop: true,
          enabled: true
        });
        
        // Evento de clique para pausar/retomar animação
        model.addEventListener("click", function(e) {
          e.stopPropagation();
          const anim = model.getAttribute("animation");
          if (anim && anim.enabled) {
            model.setAttribute("animation", "enabled", false);
            document.getElementById("ar-status").textContent = "⏸️ Animação pausada";
            isRotating = false;
          } else {
            model.setAttribute("animation", "enabled", true);
            document.getElementById("ar-status").textContent = "🔄 Animação rodando";
            isRotating = true;
          }
          setTimeout(() => {
            document.getElementById("ar-status").textContent = "📷 AR Ativo";
          }, 2000);
        });
        
        modelContainer.appendChild(model);
        currentModel = model;
        
        // Resetar transformações do container
        const container = document.getElementById("ar-model-container");
        if (container) {
          container.setAttribute("position", "0 0 0");
          container.setAttribute("rotation", "0 0 0");
          container.setAttribute("scale", "1 1 1");
        }
        
        // Mostrar painel AR
        document.getElementById("menu-screen").classList.add("hide");
        document.getElementById("back-btn").style.display = "block";
        document.getElementById("order-panel").classList.add("show");
        document.getElementById("ar-status").textContent = "🎯 Aponte para o marcador HIRO";
        
        // Esconder instrução após alguns segundos
        setTimeout(() => {
          const instruction = document.querySelector(".instruction");
          if (instruction) {
            instruction.style.opacity = "0.5";
          }
        }, 5000);
      };

      // Adicionar ao carrinho
      window.addToCart = function() {
        if (!currentProduct) return;
        
        const existingItem = cart.find((item) => item.id === currentProduct.id);
        if (existingItem) {
          existingItem.quantity += currentQuantity;
        } else {
          cart.push({
            id: currentProduct.id,
            name: currentProduct.name,
            price: currentProduct.price,
            quantity: currentQuantity,
          });
        }
        
        updateCartButton();
        alert(`✅ ${currentQuantity}x ${currentProduct.name} adicionado ao pedido!`);
        backToMenu();
      };

      // Atualizar botão do carrinho
      function updateCartButton() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const btn = document.getElementById("cart-btn");
        btn.textContent = `🛒 Ver Pedido (${totalItems})`;
        btn.style.display = totalItems > 0 ? "block" : "none";
      }

      // Abrir carrinho
      window.openCart = function() {
        renderCartItems();
        document.getElementById("cart-screen").style.display = "flex";
      };

      // Fechar carrinho
      window.closeCart = function() {
        document.getElementById("cart-screen").style.display = "none";
      };

      // Renderizar itens do carrinho
      function renderCartItems() {
        const container = document.getElementById("cart-items-container");
        container.innerHTML = "";
        let total = 0;
        
        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `
            <div>
              <strong>${item.name}</strong><br>
              <small>R$ ${item.price.toFixed(2)} un.</small>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 18px;">${item.quantity}x</span>
              <button onclick="removeFromCart(${index})" style="background:#ff5252; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">Remover</button>
            </div>
          `;
          container.appendChild(div);
        });
        
        document.getElementById("cart-total-value").textContent = `R$ ${total.toFixed(2)}`;
        if (cart.length === 0) {
          container.innerHTML = "<p style='text-align:center; color:#999'>Seu carrinho está vazio.</p>";
        }
      }

      // Remover do carrinho
      window.removeFromCart = function(index) {
        cart.splice(index, 1);
        renderCartItems();
        updateCartButton();
        if (cart.length === 0) closeCart();
      };

      // Enviar pedido completo
      window.sendFullOrder = async function() {
        if (cart.length === 0) return;
        
        const btn = document.querySelector("#cart-screen .send-order-btn");
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = "🚀 Enviando...";
        
        const urlParams = new URLSearchParams(window.location.search);
        const tableNum = parseInt(urlParams.get("mesa")) || 1;
        const cleanUrl = BACKEND_URL.endsWith("/") ? BACKEND_URL.slice(0, -1) : BACKEND_URL;
        
        try {
          const promises = cart.map((item) => {
            const orderData = {
              tableNumber: tableNum,
              productId: String(item.id),
              productName: item.name,
              productPrice: item.price,
              quantity: item.quantity,
              status: "pending",
              observation: "",
            };
            return fetch(`${cleanUrl}/orders`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(orderData),
            });
          });
          
          const results = await Promise.all(promises);
          const allOk = results.every((res) => res.ok);
          
          if (allOk) {
            alert("🚀 Pedido enviado para a cozinha com sucesso!");
            cart = [];
            updateCartButton();
            closeCart();
            backToMenu();
          } else {
            alert("⚠️ Alguns itens não foram enviados. Verifique com o garçom.");
          }
        } catch (e) {
          alert("❌ Erro de conexão com o servidor!");
          console.error(e);
        } finally {
          btn.disabled = false;
          btn.textContent = originalText;
        }
      };

      // Atualizar quantidade
      window.updateQty = function(val) {
        currentQuantity = Math.max(1, currentQuantity + val);
        document.getElementById("quantity").textContent = currentQuantity;
      };

      // Voltar ao menu
      window.backToMenu = function() {
        document.getElementById("menu-screen").classList.remove("hide");
        document.getElementById("back-btn").style.display = "none";
        document.getElementById("order-panel").classList.remove("show");
        document.getElementById("ar-model").innerHTML = "";
      };

      // Salvar URL do backend
      window.saveUrl = function() {
        BACKEND_URL = document.getElementById("backend-url").value;
        localStorage.setItem("backend_url", BACKEND_URL);
        alert("URL do backend salva!");
      };

      // Verificar status do AR
      function checkARStatus() {
        const marker = document.querySelector("a-marker");
        if (marker) {
          marker.addEventListener("markerFound", () => {
            document.getElementById("ar-status").textContent = "✅ Marcador encontrado! Modelo aparecendo";
            document.getElementById("ar-status").style.color = "#4caf50";
          });
          marker.addEventListener("markerLost", () => {
            document.getElementById("ar-status").textContent = "🔍 Procure o marcador HIRO";
            document.getElementById("ar-status").style.color = "#ff9800";
          });
        }
      }

      // Inicialização
      window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById("table-number").textContent = urlParams.get("mesa") || "1";
        document.getElementById("confirm-order").onclick = addToCart;
        renderProducts();
        checkARStatus();
        
        console.log("Cardápio AR iniciado!");
        console.log("Use os gestos para interagir com o modelo 3D!");
      };
    </script>
  </body>
</html>
