<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cardápio 3D - Restaurante</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: sans-serif;
        background-color: #000;
      }
      #video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      #ar-scene {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }
      #order-panel.show ~ #ar-scene {
        pointer-events: auto;
      }
      #menu-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 100;
        overflow-y: auto;
        transition: 0.4s ease;
        transform: translateX(0);
      }
      #menu-screen.hide {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }
      .header {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        text-align: center;
        color: white;
      }
      .table-info {
        font-size: 18px;
        background: rgba(255, 255, 255, 0.2);
        display: inline-block;
        padding: 5px 20px;
        border-radius: 25px;
        margin-top: 10px;
      }
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        padding: 20px;
      }
      .product-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      .product-image {
        width: 100%;
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        background: #f9f9f9;
      }
      .product-info {
        padding: 15px;
      }
      .product-price {
        font-size: 20px;
        font-weight: bold;
        color: #4caf50;
        margin: 10px 0;
      }
      .select-btn {
        width: 100%;
        padding: 15px;
        background: #4caf50;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
      }
      #back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 30px;
        z-index: 200;
        display: none;
        cursor: pointer;
      }
      #order-panel {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        z-index: 200;
        transform: translateY(150%);
        transition: 0.3s ease;
      }
      #order-panel.show {
        transform: translateY(0);
      }
      .product-info-ar {
        display: flex;
        justify-content: space-between;
        color: white;
        margin-bottom: 15px;
      }
      .order-controls {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      .quantity-control {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.1);
        padding: 5px 15px;
        border-radius: 25px;
        color: white;
      }
      .qty-btn {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        border: none;
        font-weight: bold;
        cursor: pointer;
      }
      .confirm-btn {
        flex: 1;
        padding: 15px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
      }
      .camera-status {
        position: absolute;
        bottom: 10px;
        right: 10px;
        color: #ff9800;
        font-size: 12px;
        z-index: 200;
        background: rgba(0, 0, 0, 0.5);
        padding: 5px;
      }
      .config-panel {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 300;
        display: flex;
        gap: 5px;
      }
      .config-panel input {
        padding: 5px;
        border-radius: 5px;
        border: none;
        font-size: 12px;
      }

      /* ESTILOS NOVOS DO CARRINHO */
      #cart-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #ff9800;
        color: white;
        border: none;
        padding: 15px 25px;
        border-radius: 50px;
        font-weight: bold;
        z-index: 150;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        display: none; /* Só aparece quando tem itens */
      }

      #cart-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        z-index: 500;
        display: none;
        flex-direction: column;
      }

      .cart-header {
        background: #4caf50;
        padding: 20px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid #eee;
      }

      .cart-footer {
        padding: 20px;
        border-top: 2px solid #eee;
        background: #f9f9f9;
      }

      .total-price {
        font-size: 22px;
        font-weight: bold;
        text-align: right;
        margin-bottom: 15px;
      }

      .send-order-btn {
        width: 100%;
        padding: 18px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: bold;
      }

      .close-cart {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <video id="video-background" autoplay playsinline muted></video>

    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      background="transparent: true"
      gesture-detector
    >
      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" intensity="0.8" position="1 2 1"></a-light>
      <a-entity camera position="0 0 0">
        <a-entity
          cursor="rayOrigin: mouse"
          raycaster="objects: .clickable"
        ></a-entity>
      </a-entity>

      <a-entity
        id="ar-model"
        class="clickable"
        gesture-handler="enabled: true"
        position="0 0.5 -4"
      ></a-entity>
    </a-scene>

    <div class="config-panel">
      <input
        type="text"
        id="backend-url"
        placeholder="URL Backend"
        value="http://192.168.30.106:3000/api"
      />
      <button onclick="saveUrl()" style="padding: 5px 10px; cursor: pointer">
        Salvar
      </button>
    </div>

    <div id="menu-screen">
      <div class="header">
        <h1>🍽️ Cardápio 3D</h1>
        <div class="table-info">Mesa <span id="table-number">1</span></div>
      </div>
      <div id="product-list" class="product-grid"></div>
    </div>

    <button id="cart-btn" onclick="openCart()">🛒 Ver Pedido (0)</button>

    <div id="cart-screen">
      <div class="cart-header">
        <h2>Seu Pedido</h2>
        <button class="close-cart" onclick="closeCart()">✕</button>
      </div>
      <div id="cart-items-container" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total-price">
          Total: <span id="cart-total-value">R$ 0,00</span>
        </div>
        <button
          id="final-send-btn"
          class="send-order-btn"
          onclick="sendFullOrder()"
        >
          🚀 Enviar Pedido para Cozinha
        </button>
      </div>
    </div>

    <button id="back-btn">← Voltar</button>

    <div id="order-panel">
      <div class="product-info-ar">
        <span id="ar-product-name" style="font-weight: bold; font-size: 18px"
          >---</span
        >
        <span id="ar-product-price" style="color: #4caf50; font-size: 18px"
          >R$ 0,00</span
        >
      </div>
      <div class="order-controls">
        <div class="quantity-control">
          <button class="qty-btn" onclick="updateQty(-1)">-</button>
          <span id="quantity" style="font-weight: bold">1</span>
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        <button id="confirm-order" class="confirm-btn">
          🛒 Adicionar ao Pedido
        </button>
      </div>
    </div>

    <div class="camera-status" id="camera-status">📷 Aguardando câmera...</div>

    <script>
      // 1. Dados e Estado
      const products = [
        {
          id: 1,
          name: "Hambúrguer Artesanal",
          description: "Carne 180g, queijo, bacon",
          price: 32.9,
          modelFile: "hamburguer.glb",
          image:
            "https://viagem.cnnbrasil.com.br/wp-content/uploads/sites/5/2022/05/origem-do-hambuguer-cnn4.jpg?w=1200&h=900&crop=1",
          color: "#ff9800",
          scale: "0.2 0.2 0.2",
        },
        {
          id: 2,
          name: "Pizza Margherita",
          description: "Mussarela, manjericão",
          price: 45.9,
          modelFile: "pizza.glb",
          image:
            "https://images.aws.nestle.recipes/original/1821a30a8a8acec9f74a1372be582610_sem_t%C3%ADtulo_(18).jpg",
          color: "#f44336",
          scale: "0.8 0.8 0.8",
        },
        {
          id: 3,
          name: "Refrigerante",
          description: "Coca-Cola 350ml",
          price: 7.5,
          modelFile: "coca.glb",
          image:
            "https://s3.amazonaws.com/lepok.w/produtos/produtos/26244.webp",
          color: "#2196f3",
          scale: "0.2 0.2 0.2",
        },
      ];

      let cart = [];
      let currentProduct = null;
      let currentQuantity = 1;
      let BACKEND_URL = "http://192.168.30.106:3000/api";
      document.getElementById("backend-url").value = BACKEND_URL;

      // 2. Funções de Câmera
      async function setupCamera() {
        const video = document.getElementById("video-background");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });
          video.srcObject = stream;
          document.getElementById("camera-status").textContent =
            "📷 Câmera Ativa";
        } catch (e) {
          document.getElementById("camera-status").textContent =
            "⚠️ Erro na câmera";
        }
      }

      // 3. Renderização do Cardápio
      function renderProducts() {
        const container = document.getElementById("product-list");
        container.innerHTML = "";
        products.forEach((p) => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <div class="product-image">
              <img src="${p.image}" style="width:100%; height:100%; object-fit:cover;" />
            </div>

            <div class="product-info">
              <h3>${p.name}</h3>
              <p style="color: #666; font-size: 14px; margin: 5px 0;">${p.description}</p>
              <div class="product-price">R$ ${p.price.toFixed(2)}</div>
              <button class="select-btn" onclick="selectProduct(${p.id})">🔍 Ver em 3D</button>
            </div>
          `;
          container.appendChild(card);
        });
      }

      function selectProduct(id) {
        const product = products.find((p) => p.id === id);
        if (!product) return;
        currentProduct = product;
        currentQuantity = 1;
        document.getElementById("quantity").textContent = "1";
        document.getElementById("ar-product-name").textContent = product.name;
        document.getElementById("ar-product-price").textContent =
          `R$ ${product.price.toFixed(2)}`;

        const modelParent = document.getElementById("ar-model");
        modelParent.innerHTML = "";
        const model = document.createElement("a-entity");

        // Define o modelo e escala
        model.setAttribute(
          "gltf-model",
          `url(assets/models/${product.modelFile})`,
        );
        model.setAttribute("scale", product.scale);
        model.setAttribute("class", "clickable"); // Garante que seja clicável

        // Configura a animação inicial
        model.setAttribute("animation", {
          property: "rotation",
          to: "0 360 0",
          dur: 20000,
          easing: "linear",
          loop: true,
          enabled: true, // Começa ativa
        });

        // LÓGICA DE CLIQUE PARA PARAR/VOLTAR ANIMACAO
        let isRotating = true;
        model.addEventListener("click", function () {
          if (isRotating) {
            // Para a animação
            model.setAttribute("animation", "enabled", false);
            console.log("Animação pausada");
          } else {
            // Retoma a animação
            model.setAttribute("animation", "enabled", true);
            console.log("Animação retomada");
          }
          isRotating = !isRotating;
        });

        modelParent.appendChild(model);

        document.getElementById("menu-screen").classList.add("hide");
        document.getElementById("back-btn").style.display = "block";
        document.getElementById("order-panel").classList.add("show");
      }

      // 4. Lógica do Carrinho
      function addToCart() {
        if (!currentProduct) return;

        const existingItem = cart.find((item) => item.id === currentProduct.id);
        if (existingItem) {
          existingItem.quantity += currentQuantity;
        } else {
          cart.push({
            id: currentProduct.id,
            name: currentProduct.name,
            price: currentProduct.price,
            quantity: currentQuantity,
          });
        }

        updateCartButton();
        alert(
          `✅ ${currentQuantity}x ${currentProduct.name} adicionado ao pedido!`,
        );
        backToMenu();
      }

      function updateCartButton() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const btn = document.getElementById("cart-btn");
        btn.textContent = `🛒 Ver Pedido (${totalItems})`;
        btn.style.display = totalItems > 0 ? "block" : "none";
      }

      function openCart() {
        renderCartItems();
        document.getElementById("cart-screen").style.display = "flex";
      }

      function closeCart() {
        document.getElementById("cart-screen").style.display = "none";
      }

      function renderCartItems() {
        const container = document.getElementById("cart-items-container");
        container.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `
            <div>
              <strong>${item.name}</strong><br>
              <small>R$ ${item.price.toFixed(2)} un.</small>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span>${item.quantity}x</span>
              <button onclick="removeFromCart(${index})" style="background:#ff5252; color:white; border:none; padding:5px 8px; border-radius:5px">Remover</button>
            </div>
          `;
          container.appendChild(div);
        });

        document.getElementById("cart-total-value").textContent =
          `R$ ${total.toFixed(2)}`;
        if (cart.length === 0) {
          container.innerHTML =
            "<p style='text-align:center; color:#999'>Seu carrinho está vazio.</p>";
          document.getElementById("final-send-btn").disabled = true;
        } else {
          document.getElementById("final-send-btn").disabled = false;
        }
      }

      function removeFromCart(index) {
        cart.splice(index, 1);
        renderCartItems();
        updateCartButton();
        if (cart.length === 0) closeCart();
      }

      // 5. Envio do Pedido Completo
      async function sendFullOrder() {
        if (cart.length === 0) return;

        const btn = document.getElementById("final-send-btn");
        btn.disabled = true;
        btn.textContent = "🚀 Enviando...";

        const urlParams = new URLSearchParams(window.location.search);
        const tableNum = parseInt(urlParams.get("mesa")) || 1;

        // Limpa URL
        const cleanUrl = BACKEND_URL.endsWith("/")
          ? BACKEND_URL.slice(0, -1)
          : BACKEND_URL;

        // Vamos enviar os itens um por um (ou pode adaptar para um bulk se seu backend suportar)
        // Aqui usaremos o seu endpoint atual /orders chamando para cada item
        try {
          const promises = cart.map((item) => {
            const orderData = {
              tableNumber: tableNum,
              productId: String(item.id),
              productName: item.name,
              productPrice: item.price,
              quantity: item.quantity,
              status: "pending",
              observation: "",
            };
            return fetch(`${cleanUrl}/orders`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(orderData),
            });
          });

          const results = await Promise.all(promises);
          const allOk = results.every((res) => res.ok);

          if (allOk) {
            alert("🚀 SUCESSO! Todos os itens foram enviados para a cozinha.");
            cart = [];
            updateCartButton();
            closeCart();
            backToMenu();
          } else {
            alert(
              "⚠️ Alguns itens podem não ter sido enviados. Verifique com o garçom.",
            );
          }
        } catch (e) {
          alert("❌ Erro de conexão com o servidor!");
        } finally {
          btn.disabled = false;
          btn.textContent = "🚀 Enviar Pedido para Cozinha";
        }
      }

      // Utilitários
      function updateQty(val) {
        currentQuantity = Math.max(1, currentQuantity + val);
        document.getElementById("quantity").textContent = currentQuantity;
      }

      function backToMenu() {
        document.getElementById("menu-screen").classList.remove("hide");
        document.getElementById("back-btn").style.display = "none";
        document.getElementById("order-panel").classList.remove("show");
        document.getElementById("ar-model").innerHTML = "";
      }

      function saveUrl() {
        BACKEND_URL = document.getElementById("backend-url").value;
        localStorage.setItem("backend_url", BACKEND_URL);
        alert("URL salva!");
      }

      // Inicialização
      window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById("table-number").textContent =
          urlParams.get("mesa") || "1";
        document.getElementById("confirm-order").onclick = addToCart;
        renderProducts();
        setupCamera();
      };
    </script>
  </body>
</html>
