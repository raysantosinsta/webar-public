<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cardápio AR - Restaurante</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- Gesture support -->
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
      }

      /* Tela do Cardápio */
      #menu-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 100;
        overflow-y: auto;
        transition: transform 0.4s ease;
        transform: translateX(0);
      }
      #menu-screen.hide {
        transform: translateX(-100%);
      }

      .header {
        background: rgba(0, 0, 0, 0.3);
        padding: 20px;
        text-align: center;
        color: white;
      }
      .header h1 {
        font-size: 28px;
        margin-bottom: 10px;
      }
      .table-info {
        font-size: 18px;
        background: rgba(255, 255, 255, 0.2);
        display: inline-block;
        padding: 5px 20px;
        border-radius: 25px;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .product-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition: transform 0.3s ease;
      }
      .product-card:hover {
        transform: translateY(-5px);
      }
      .product-image {
        width: 100%;
        height: 200px;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
      }
      .product-info {
        padding: 15px;
      }
      .product-info h3 {
        font-size: 18px;
        margin-bottom: 8px;
        color: #333;
      }
      .product-info p {
        font-size: 14px;
        color: #666;
        margin-bottom: 10px;
      }
      .product-price {
        font-size: 22px;
        font-weight: bold;
        color: #4caf50;
      }
      .select-btn {
        width: 100%;
        padding: 12px;
        background: #4caf50;
        color: white;
        border: none;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
      }
      .footer {
        text-align: center;
        padding: 20px;
        color: white;
        background: rgba(0, 0, 0, 0.3);
      }

      /* Botão Voltar */
      #back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        z-index: 200;
        backdrop-filter: blur(5px);
        display: none;
        font-weight: bold;
      }

      /* Painel de Pedido */
      #order-panel {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 15px;
        z-index: 200;
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }
      #order-panel.show {
        transform: translateY(0);
      }

      .product-info-ar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        color: white;
      }
      .product-name-ar {
        font-size: 18px;
        font-weight: bold;
      }
      .product-price-ar {
        font-size: 18px;
        color: #4caf50;
      }
      .order-controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .quantity-control {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.2);
        padding: 5px 15px;
        border-radius: 25px;
      }
      .qty-btn {
        background: white;
        color: #333;
        border: none;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        font-size: 20px;
        cursor: pointer;
        font-weight: bold;
      }
      #quantity {
        color: white;
        font-size: 18px;
        min-width: 35px;
        text-align: center;
        font-weight: bold;
      }
      .confirm-btn {
        flex: 1;
        background: #4caf50;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
      }

      /* Notificação */
      .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        padding: 15px;
        z-index: 1000;
        transform: translateX(400px);
        transition: transform 0.3s ease;
      }
      .notification.show {
        transform: translateX(0);
      }
      .notification-content {
        display: flex;
        align-items: center;
        gap: 15px;
        color: white;
      }

      /* Status */
      .camera-status {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.6);
        color: #ff9800;
        padding: 5px 10px;
        border-radius: 8px;
        font-size: 11px;
        z-index: 200;
      }
      .ar-instructions {
        position: absolute;
        bottom: 100px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        font-size: 12px;
        z-index: 200;
        display: none;
      }
      .config-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        border-radius: 10px;
        z-index: 300;
        display: flex;
        gap: 10px;
      }
      .config-panel input {
        padding: 8px;
        border-radius: 5px;
        border: none;
        width: 200px;
        font-size: 12px;
      }
      .config-panel button {
        padding: 8px 12px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="config-panel">
      <input
        type="text"
        id="backend-url"
        placeholder="URL do Backend"
        value="http://192.168.30.106:3000"
      />
      <button id="save-url">Salvar</button>
    </div>

    <div id="menu-screen">
      <div class="header">
        <h1>🍽️ Cardápio AR</h1>
        <div class="table-info">Mesa <span id="table-number">1</span></div>
      </div>
      <div id="product-list" class="product-grid">
        <div
          class="loading"
          style="text-align: center; padding: 40px; color: white"
        >
          Carregando...
        </div>
      </div>
      <div class="footer">
        <p>📱 Toque em um produto para ver em Realidade Aumentada!</p>
        <p style="font-size: 12px">
          🔍
          <a
            href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
            target="_blank"
            style="color: #ff9800"
            >Baixar Marcador HIRO</a
          >
        </p>
      </div>
    </div>

    <button id="back-btn">← Voltar ao Cardápio</button>

    <div id="order-panel">
      <div class="product-info-ar">
        <span id="ar-product-name" class="product-name-ar">---</span>
        <span id="ar-product-price" class="product-price-ar">R$ --,--</span>
      </div>
      <div class="order-controls">
        <div class="quantity-control">
          <button id="decrease-qty" class="qty-btn">-</button>
          <span id="quantity">1</span>
          <button id="increase-qty" class="qty-btn">+</button>
        </div>
        <button id="confirm-order" class="confirm-btn">📝 Fazer Pedido</button>
      </div>
    </div>

    <div class="camera-status" id="camera-status">📷 Aguardando...</div>
    <div class="ar-instructions" id="ar-instructions">
      🎯 Aponte a câmera para o marcador HIRO
    </div>

    <div id="notification" class="notification">
      <div class="notification-content">
        <div class="notification-icon">🎉</div>
        <div class="notification-text">
          <h3>Pedido Pronto!</h3>
          <p id="notification-message"></p>
        </div>
      </div>
    </div>

 <a-scene
  id="ar-scene"
  embedded
  vr-mode-ui="enabled: false"
  style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"
>
  <!-- Câmera -->
  <a-entity camera position="0 0 0"></a-entity>

  <!-- Container do modelo -->
  <a-entity
    id="ar-model"
    class="tocavel"
    gesture-handler="enabled: true"
    position="0 0.15 -1"     <!-- posição mais central e confortável -->
    scale="0.25 0.25 0.25"   <!-- ← Modelo bem menor -->
    rotation="0 0 0"
  ></a-entity>

  <!-- Fallback -->
  <a-box
    id="fallback-cube"
    color="#FF6B6B"
    width="0.5"
    height="0.5"
    depth="0.5"
    position="0 0.15 -1"
    opacity="0.3"
    visible="false"
  ></a-box>

  <!-- Iluminação -->
  <a-light type="ambient" intensity="0.9"></a-light>
  <a-light type="directional" intensity="0.8" position="2 3 2"></a-light>
</a-scene>

   <script>
  const products = [
    {
      id: 1,
      name: "Hambúrguer Artesanal",
      description: "Pão brioche, carne 180g, queijo, bacon",
      price: 32.9,
      modelFile: "hamburguer.glb",
      emoji: "🍔",
      color: "#ff9800",
    },
    {
      id: 2,
      name: "Pizza Margherita",
      description: "Molho, mussarela, manjericão",
      price: 45.9,
      modelFile: "pizza.glb",
      emoji: "🍕",
      color: "#f44336",
    },
    {
      id: 3,
      name: "Refrigerante",
      description: "Coca-Cola 350ml",
      price: 7.5,
      modelFile: "soda.glb",
      emoji: "🥤",
      color: "#2196f3",
    },
  ];

  let currentProduct = null;
  let currentQuantity = 1;
  let BACKEND_URL = localStorage.getItem("backend_url") || "http://192.168.30.106:3000";

  function showNotification(msg, isSuccess = true) {
    const notif = document.getElementById("notification");
    const msgElement = document.getElementById("notification-message");
    const icon = notif.querySelector(".notification-icon");

    msgElement.textContent = msg;
    if (isSuccess) {
      icon.textContent = "✅";
      notif.style.background = "linear-gradient(135deg, #4CAF50 0%, #45a049 100%)";
    } else {
      icon.textContent = "❌";
      notif.style.background = "linear-gradient(135deg, #F44336 0%, #d32f2f 100%)";
    }

    notif.classList.add("show");
    setTimeout(() => {
      notif.classList.remove("show");
      notif.style.background = "linear-gradient(135deg, #667eea 0%, #764ba2 100%)";
      icon.textContent = "🎉";
    }, 3000);
  }

  function updateStatus(msg, isError = false) {
    const status = document.getElementById("camera-status");
    status.textContent = msg;
    status.style.color = isError ? "#F44336" : "#ff9800";
  }

  function renderProducts() {
    const container = document.getElementById("product-list");
    container.innerHTML = "";

    products.forEach((p) => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <div class="product-image" style="background: ${p.color}20;">
          <span style="font-size:64px;">${p.emoji}</span>
        </div>
        <div class="product-info">
          <h3>${p.name}</h3>
          <p>${p.description}</p>
          <div class="product-price">R$ ${p.price.toFixed(2)}</div>
        </div>
        <button class="select-btn" data-id="${p.id}">🔍 Ver em 3D</button>
      `;
      card.querySelector(".select-btn").onclick = () => selectProduct(p.id);
      container.appendChild(card);
    });
  }

  // ==================== FUNÇÃO CORRIGIDA PARA CARREGAR MODELO ====================

function loadModel(modelFile) {
  const modelEntity = document.getElementById("ar-model");
  const fallback = document.getElementById("fallback-cube");

  // Limpa modelo anterior
  while (modelEntity.firstChild) {
    modelEntity.removeChild(modelEntity.firstChild);
  }

  const modelPath = `assets/models/${modelFile}`;
  console.log(`🔍 Carregando modelo: ${modelPath}`);

  const model = document.createElement("a-entity");
  model.setAttribute("gltf-model", `url(${modelPath})`);
  model.setAttribute("scale", "0.25 0.25 0.25");        // menor
  model.setAttribute("position", "0 0.15 -1");
  model.setAttribute("class", "tocavel");
  model.setAttribute("gesture-handler", "enabled: true");

  // ====================== ROTAÇÃO AUTOMÁTICA INFINITA ======================
  model.setAttribute("animation", {
    property: "rotation",
    to: "0 360 0",           // gira no eixo Y (horizontal)
    dur: 15000,              // 15 segundos por volta completa (ajuste se quiser mais rápido)
    easing: "linear",
    loop: true
  });

  // Sucesso
  model.addEventListener("model-loaded", () => {
    console.log("✅ Modelo carregado com sucesso!");
    if (fallback) fallback.setAttribute("visible", "false");
    updateStatus(`✅ ${currentProduct?.name} carregado • Gire com o dedo`);
  });

  // Erro
  model.addEventListener("model-error", (err) => {
    console.error("❌ Erro ao carregar modelo:", err);
    updateStatus(`⚠️ Erro ao carregar ${modelFile}`, true);
    if (fallback) fallback.setAttribute("visible", "true");
  });

  modelEntity.appendChild(model);
}
function selectProduct(id) {
  currentProduct = products.find((p) => p.id === id);
  if (!currentProduct) return;

  currentQuantity = 1;
  document.getElementById("quantity").textContent = "1";
  document.getElementById("ar-product-name").textContent = currentProduct.name;
  document.getElementById("ar-product-price").textContent = `R$ ${currentProduct.price.toFixed(2)}`;

  loadModel(currentProduct.modelFile);

  // Troca de tela
  document.getElementById("menu-screen").classList.add("hide");
  document.getElementById("back-btn").style.display = "block";
  document.getElementById("order-panel").classList.add("show");
  document.getElementById("ar-instructions").style.display = "block";

  updateStatus(`✅ Carregando ${currentProduct.name}...`);

  // Garantia extra para esconder fallback
  setTimeout(() => {
    const fallback = document.getElementById("fallback-cube");
    if (fallback) fallback.setAttribute("visible", "false");
  }, 600);

  console.log(`🎯 ${currentProduct.name} carregado`);
}
  

function backToMenu() {
    document.getElementById("menu-screen").classList.remove("hide");
    document.getElementById("back-btn").style.display = "none";
    document.getElementById("order-panel").classList.remove("show");
    document.getElementById("ar-instructions").style.display = "none";
    updateStatus("📱 Cardápio");
  }

  async function makeOrder() {
    if (!currentProduct) {
      showNotification("❌ Selecione um produto primeiro!", false);
      return;
    }

    const confirmBtn = document.getElementById("confirm-order");
    const originalText = confirmBtn.textContent;
    confirmBtn.textContent = "⏳ Enviando...";
    confirmBtn.disabled = true;

    try {
      const urlParams = new URLSearchParams(window.location.search);
      let tableNumber = parseInt(urlParams.get("mesa"));
      if (isNaN(tableNumber) || tableNumber < 1) tableNumber = 1;

      document.getElementById("table-number").textContent = tableNumber;

      const orderData = {
        tableNumber: tableNumber,
        productName: currentProduct.name,
        productPrice: currentProduct.price,
        quantity: currentQuantity,
        observation: "",
      };

      const response = await fetch(`${BACKEND_URL}/api/orders`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(orderData),
      });

      if (response.ok) {
        showNotification(`✅ Pedido enviado para a Mesa ${tableNumber}!`, true);
        setTimeout(backToMenu, 1800);
      } else {
        const errorText = await response.text().catch(() => "");
        showNotification(`❌ Erro ${response.status}: ${errorText || "Falha ao enviar"}`, false);
      }
    } catch (error) {
      console.error("❌ Erro de rede:", error);
      showNotification(`❌ Não conseguiu conectar no backend`, false);
    } finally {
      confirmBtn.textContent = originalText;
      confirmBtn.disabled = false;
    }
  }

  function saveBackendUrl() {
    const input = document.getElementById("backend-url");
    let url = input.value.trim().replace(/\/$/, "");
    BACKEND_URL = url;
    localStorage.setItem("backend_url", BACKEND_URL);
    showNotification(`✅ Backend configurado: ${BACKEND_URL}`, true);
  }

  function loadBackendUrl() {
    const saved = localStorage.getItem("backend_url");
    if (saved) {
      BACKEND_URL = saved;
      document.getElementById("backend-url").value = saved;
    }
  }

  // ==================== EVENTOS ====================
  document.getElementById("back-btn").onclick = backToMenu;
  document.getElementById("confirm-order").onclick = makeOrder;
  document.getElementById("save-url").onclick = saveBackendUrl;

  document.getElementById("decrease-qty").onclick = () => {
    if (currentQuantity > 1) currentQuantity--;
    document.getElementById("quantity").textContent = currentQuantity;
  };

  document.getElementById("increase-qty").onclick = () => {
    if (currentQuantity < 99) currentQuantity++;
    document.getElementById("quantity").textContent = currentQuantity;
  };

  // Inicialização
  loadBackendUrl();
  renderProducts();
  updateStatus("📱 Toque em um produto para começar");

  window.addEventListener("load", () => {
    const urlParams = new URLSearchParams(window.location.search);
    let tableNumber = parseInt(urlParams.get("mesa")) || 1;
    document.getElementById("table-number").textContent = tableNumber;
    console.log(`🍽️ Mesa detectada: ${tableNumber}`);
  });
</script>
  </body>
</html>
