<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Gourmet AR - Cardápio Interativo 3D</title>

    <!-- Preconnect para carregamento mais rápido -->
    <link rel="preconnect" href="https://aframe.io" />
    <link rel="preconnect" href="https://raw.githack.com" />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts Premium -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />

    <!-- Socket.io Client -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "Inter", sans-serif;
        background-color: #0a0a0a;
      }

      #video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
        filter: brightness(0.95);
      }

      #ar-scene {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: auto;
      }

      #menu-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          145deg,
          rgba(15, 25, 35, 0.95) 0%,
          rgba(10, 18, 25, 0.98) 100%
        );
        backdrop-filter: blur(20px);
        z-index: 100;
        overflow-y: auto;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(0);
      }

      #menu-screen.hide {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }

      .header {
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(0, 0, 0, 0.4) 100%
        );
        backdrop-filter: blur(10px);
        padding: 30px 20px;
        text-align: center;
        color: white;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 600;
        background: linear-gradient(135deg, #fff 0%, #ff6b35 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .table-info {
        font-size: 14px;
        background: rgba(255, 107, 53, 0.2);
        backdrop-filter: blur(5px);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        border-radius: 40px;
        margin-top: 12px;
        border: 1px solid rgba(255, 107, 53, 0.3);
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        padding: 24px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .product-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
      }

      .product-card:hover {
        transform: translateY(-8px) scale(1.02);
        border-color: rgba(255, 107, 53, 0.3);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }

      .product-image {
        width: 100%;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
      }

      .product-info {
        padding: 20px;
      }

      .product-info h3 {
        font-size: 20px;
        font-weight: 600;
        color: white;
        margin-bottom: 8px;
      }

      .product-description {
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        line-height: 1.4;
        margin-bottom: 12px;
      }

      .product-price {
        font-size: 24px;
        font-weight: 700;
        color: #ff6b35;
        margin: 12px 0;
      }

      .select-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        color: white;
        border: none;
        font-weight: 600;
        cursor: pointer;
        font-size: 15px;
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s;
      }

      .select-btn:active {
        transform: scale(0.98);
      }

      #back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 20px;
        border-radius: 40px;
        z-index: 200;
        display: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        gap: 8px;
        align-items: center;
        transition: all 0.3s;
      }

      #back-btn:active {
        transform: translateX(-5px);
        background: rgba(255, 107, 53, 0.9);
      }

      #order-panel {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(20px);
        border-radius: 32px;
        padding: 24px;
        z-index: 200;
        transform: translateY(150%);
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      #order-panel.show {
        transform: translateY(0);
      }

      .product-info-ar {
        display: flex;
        justify-content: space-between;
        color: white;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      #ar-product-name {
        font-size: 20px;
        font-weight: 600;
      }

      #ar-product-price {
        font-size: 22px;
        font-weight: 700;
        color: #ff6b35;
      }

      .order-controls {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .quantity-control {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.1);
        padding: 8px 20px;
        border-radius: 50px;
        color: white;
      }

      .qty-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        font-weight: bold;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 20px;
        transition: all 0.2s;
      }

      .qty-btn:active {
        transform: scale(0.95);
        background: #ff6b35;
      }

      .confirm-btn {
        flex: 1;
        padding: 14px;
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.3s;
      }

      .confirm-btn:active {
        transform: scale(0.98);
      }

      #info-panel {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(20px);
        border-radius: 28px;
        padding: 20px;
        z-index: 180;
        transform: translateY(150%);
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-height: 40vh;
        overflow-y: auto;
      }

      #info-panel.show {
        transform: translateY(0);
      }

      .info-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      }

      .ingredients-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }

      .ingredient-tag {
        background: rgba(255, 107, 53, 0.15);
        border: 1px solid rgba(255, 107, 53, 0.3);
        border-radius: 40px;
        padding: 6px 14px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.9);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .close-info {
        position: absolute;
        top: 16px;
        right: 20px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.5);
        font-size: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .close-info:active {
        color: #ff6b35;
        transform: rotate(90deg);
      }

      #cart-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        color: white;
        border: none;
        padding: 16px 28px;
        border-radius: 60px;
        font-weight: 600;
        z-index: 150;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        display: none;
        font-size: 15px;
        gap: 10px;
        align-items: center;
        transition: all 0.3s;
      }

      #cart-btn:active {
        transform: scale(0.98);
      }

      #cart-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 18, 25, 0.98);
        backdrop-filter: blur(20px);
        z-index: 500;
        display: none;
        flex-direction: column;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .cart-header {
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        padding: 28px 24px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .cart-header h2 {
        font-size: 24px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .cart-item-info h4 {
        color: white;
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 5px;
      }

      .cart-item-info p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
      }

      .cart-item-actions {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .cart-item-quantity {
        color: white;
        font-size: 18px;
        font-weight: 600;
      }

      .remove-item-btn {
        background: rgba(255, 82, 82, 0.2);
        border: 1px solid rgba(255, 82, 82, 0.3);
        color: #ff5252;
        padding: 8px 16px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }

      .remove-item-btn:active {
        transform: scale(0.95);
        background: rgba(255, 82, 82, 0.4);
      }

      .cart-footer {
        padding: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.3);
      }

      .total-price {
        font-size: 28px;
        font-weight: 700;
        text-align: right;
        margin-bottom: 20px;
        color: #ff6b35;
      }

      .send-order-btn {
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
        color: white;
        border: none;
        border-radius: 60px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .send-order-btn:active {
        transform: scale(0.98);
      }

      .close-cart {
        background: none;
        border: none;
        color: white;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        transition: all 0.2s;
      }

      .close-cart:active {
        background: rgba(255, 255, 255, 0.2);
        transform: rotate(90deg);
      }

      .camera-status {
        position: fixed;
        bottom: 20px;
        left: 20px; /* Alterado de right para left */
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        padding: 8px 16px;
        border-radius: 40px;
        font-size: 12px;
        z-index: 200;
        font-weight: 500;
        color: #ff6b35;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .instruction {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        color: white;
        padding: 10px 20px;
        border-radius: 40px;
        z-index: 150;
        font-size: 13px;
        pointer-events: none;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .gesture-instruction {
        position: fixed;
        bottom: 90px;
        left: 20px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        color: rgba(255, 255, 255, 0.9);
        padding: 10px 16px;
        border-radius: 40px;
        font-size: 11px;
        z-index: 150;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .config-panel {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 300;
        display: flex;
        gap: 5px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        padding: 5px;
        border-radius: 40px;
      }

      .config-panel input {
        padding: 8px 12px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 11px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        width: 220px;
      }

      .config-panel button {
        padding: 8px 16px;
        border-radius: 30px;
        border: none;
        background: #ff6b35;
        color: white;
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
      }

      #connection-status {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        padding: 8px 16px;
        border-radius: 40px;
        font-size: 12px;
        z-index: 300;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      #connection-status.connected {
        color: #4caf50;
      }
      #connection-status.disconnected {
        color: #f44336;
      }
      #connection-status.connecting {
        color: #ff9800;
      }

      .toast-message {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 500;
        z-index: 10000;
        transition: transform 0.3s ease;
        white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .toast-message.show {
        transform: translateX(-50%) translateY(0);
      }

      .order-notification {
        position: fixed;
        top: 80px;
        right: 20px;
        left: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        transform: translateX(120%);
        transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        cursor: pointer;
      }

      .order-notification.show {
        transform: translateX(0);
      }

      .notification-content {
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        color: white;
      }

      .notification-icon {
        font-size: 48px;
        animation: bounce 0.5s ease;
      }

      .notification-text {
        flex: 1;
      }

      .notification-text h4 {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .notification-close {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 20px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }

      /* Ajuste para dispositivos móveis */
      @media (max-width: 768px) {
        .camera-status {
          bottom: 16px;
          left: 16px; /* Esquerda em mobile também */
          font-size: 10px;
          padding: 6px 12px;
        }

        #cart-btn {
          bottom: 16px;
          right: 16px;
          padding: 12px 20px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <video id="video-background" autoplay playsinline muted></video>

    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      background="transparent: true"
      gesture-detector
      performance="minPixelRatio: 0.5"
    >
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="0.7" position="1 2 1"></a-light>
      <a-light type="point" intensity="0.4" position="0 2 0"></a-light>

      <a-entity camera position="0 0 0">
        <a-entity
          cursor="rayOrigin: mouse"
          raycaster="objects: .clickable"
        ></a-entity>
      </a-entity>

      <a-entity id="ar-model-container" position="0 0.5 -4" gesture-handler>
        <a-entity id="ar-model" class="clickable"></a-entity>
      </a-entity>
    </a-scene>

    <div class="config-panel">
      <input
        type="text"
        id="backend-url"
        placeholder="URL do Servidor"
        value="https://backend-nestjs-ra.onrender.com/"
      />
      <button onclick="saveUrl()"><i class="fas fa-save"></i></button>
    </div>

    <div id="menu-screen">
      <div class="header">
        <h1><i class="fas fa-utensils"></i> Gourmet AR</h1>
        <div class="table-info">
          <i class="fas fa-chair"></i> Mesa <span id="table-number">1</span>
        </div>
      </div>
      <div id="product-list" class="product-grid"></div>
    </div>

    <div id="connection-status" class="connecting">
      <i class="fas fa-circle"></i> <span>Conectando...</span>
    </div>

    <button id="cart-btn" onclick="openCart()">
      <i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span>
    </button>

    <div id="cart-screen">
      <div class="cart-header">
        <h2><i class="fas fa-shopping-bag"></i> Seu Pedido</h2>
        <button class="close-cart" onclick="closeCart()">✕</button>
      </div>
      <div id="cart-items-container" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total-price">
          Total: <span id="cart-total-value">R$ 0,00</span>
        </div>
        <button class="send-order-btn" onclick="sendFullOrder()">
          <i class="fas fa-paper-plane"></i> Enviar Pedido
        </button>
      </div>
    </div>

    <button id="back-btn" onclick="backToMenu()">
      <i class="fas fa-arrow-left"></i> Voltar
    </button>

    <div id="order-panel">
      <div class="product-info-ar">
        <span id="ar-product-name">---</span>
        <span id="ar-product-price">R$ 0,00</span>
      </div>
      <div class="order-controls">
        <div class="quantity-control">
          <button class="qty-btn" onclick="updateQty(-1)">-</button>
          <span id="quantity">1</span>
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        <button id="confirm-order" class="confirm-btn">
          <i class="fas fa-cart-plus"></i> Adicionar
        </button>
      </div>
    </div>

    <div id="info-panel">
      <button class="close-info" onclick="closeInfoPanel()">
        <i class="fas fa-times"></i>
      </button>
      <div class="info-header">
        <i class="fas fa-info-circle"></i>
        <h3>Informações</h3>
      </div>
      <div id="info-content"></div>
    </div>

    <div class="camera-status" id="camera-status">
      <i class="fas fa-camera"></i> Iniciando...
    </div>
    <div class="instruction">
      <i class="fas fa-hand-peace"></i> Toque no modelo
    </div>
    <div class="gesture-instruction">
      <i class="fas fa-hand-peace"></i> clicar pausa modelo
    </div>

    <script>
      const products = [
        {
          id: 1,
          name: "Hambúrguer Artesanal",
          description:
            "Carne Angus 180g, queijo cheddar, bacon crocante, alface, tomate e pão brioche",
          price: 32.9,
          modelFile: "hamburguer.glb",
          image:
            "https://viagem.cnnbrasil.com.br/wp-content/uploads/sites/5/2022/05/origem-do-hambuguer-cnn4.jpg?w=1200&h=900&crop=1",
          scale: "0.1 0.1 0.1",
          position: "0 0.6 0",
          ingredients: [
            "Carne Angus 180g",
            "Queijo Cheddar",
            "Bacon Crocante",
            "Alface",
            "Tomate",
            "Pão Brioche",
          ],
        },
        {
          id: 2,
          name: "Pizza Margherita",
          description:
            "Massa fininha, molho de tomate, mussarela de búfala, manjericão fresco e azeite",
          price: 45.9,
          modelFile: "pizza.glb",
          image:
            "https://images.aws.nestle.recipes/original/1821a30a8a8acec9f74a1372be582610_sem_t%C3%ADtulo_(18).jpg",
          scale: "10 10 10",
          position: "0 0 0",
          ingredients: [
            "Massa Fininha",
            "Molho de Tomate",
            "Mussarela de Búfala",
            "Manjericão",
            "Azeite",
          ],
        },
        {
          id: 3,
          name: "Refrigerante",
          description: "Coca-Cola 350ml - Bem gelada",
          price: 7.5,
          modelFile: "coca.glb",
          image:
            "https://s3.amazonaws.com/lepok.w/produtos/produtos/26244.webp",
          scale: "0.25 0.25 0.25",
          position: "0 -0.2 0",
          ingredients: ["Água Gaseificada", "Açúcar", "Extrato de Cola"],
        },
      ];

      let cart = [],
        currentProduct = null,
        currentQuantity = 1,
        BACKEND_URL = "https://backend-nestjs-ra.onrender.com/",
        socket = null;

      const savedUrl = localStorage.getItem("backend_url");
      if (savedUrl) {
        BACKEND_URL = savedUrl;
        document.getElementById("backend-url").value = savedUrl;
      }

      function showToast(message, color) {
        let toast = document.getElementById("toast-message");
        if (!toast) {
          toast = document.createElement("div");
          toast.id = "toast-message";
          toast.className = "toast-message";
          document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.backgroundColor = color;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
      }

      function showOrderNotification(productName) {
        let notification = document.getElementById("order-notification");
        if (!notification) {
          notification = document.createElement("div");
          notification.id = "order-notification";
          notification.className = "order-notification";
          notification.innerHTML = `<div class="notification-content"><div class="notification-icon">🎉</div><div class="notification-text"><h4>Pedido Pronto!</h4><p>Seu pedido está pronto</p></div><button class="notification-close">×</button></div>`;
          document.body.appendChild(notification);
          notification.querySelector(".notification-close").onclick = () =>
            notification.classList.remove("show");
        }
        notification.querySelector(".notification-text").innerHTML =
          `<h4>🍕 Pedido Pronto!</h4><p>Seu ${productName} está pronto</p>`;
        notification.classList.add("show");
        setTimeout(() => notification.classList.remove("show"), 8000);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }

      function updateConnectionStatus(status, message) {
        const div = document.getElementById("connection-status");
        div.className = status;
        div.innerHTML = `<i class="fas fa-circle"></i> <span>${message}</span>`;
      }

      function connectWebSocket(tableNumber) {
        if (socket) socket.disconnect();
        updateConnectionStatus("connecting", "Conectando...");
        try {
          socket = io(BACKEND_URL, {
            query: { tableNumber: tableNumber, type: "customer" },
            transports: ["websocket", "polling"],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 2000,
          });
          socket.on("connect", () => {
            updateConnectionStatus("connected", "Conectado");
            socket.emit("join-table", { tableNumber });
          });
          socket.on("connect_error", () =>
            updateConnectionStatus("disconnected", "Falha na conexão"),
          );
          socket.on("disconnect", () =>
            updateConnectionStatus("disconnected", "Desconectado"),
          );
          socket.on("order-confirmed", () =>
            showToast("✅ Pedido recebido pela cozinha!", "#4CAF50"),
          );
          socket.on("order-ready", (data) =>
            showOrderNotification(data.productName),
          );
          socket.on("order-updated", (data) => {
            if (data.status === "preparing")
              showToast("👨‍🍳 Seu pedido está sendo preparado!", "#FF9800");
          });
        } catch (e) {
          updateConnectionStatus("disconnected", "Erro de conexão");
        }
      }

      async function setupCamera() {
        const video = document.getElementById("video-background");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });
          video.srcObject = stream;
          document.getElementById("camera-status").innerHTML =
            '<i class="fas fa-camera"></i> Câmera Ativa';
        } catch (e) {
          document.getElementById("camera-status").innerHTML =
            '<i class="fas fa-exclamation-triangle"></i> Erro na câmera';
        }
      }

      function renderProducts() {
        const container = document.getElementById("product-list");
        container.innerHTML = "";
        products.forEach((p) => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `<div class="product-image"><img src="${p.image}" loading="lazy" /></div><div class="product-info"><h3>${p.name}</h3><p class="product-description">${p.description}</p><div class="product-price">R$ ${p.price.toFixed(2)}</div><button class="select-btn" onclick="selectProduct(${p.id})"><i class="fas fa-cube"></i> Ver em 3D</button></div>`;
          container.appendChild(card);
        });
      }

      function showProductInfo(product) {
        document.getElementById("info-content").innerHTML =
          `<div class="info-description"><i class="fas fa-align-left"></i> ${product.description}</div><div class="info-header"><i class="fas fa-leaf"></i><h3>Ingredientes</h3></div><div class="ingredients-list">${product.ingredients.map((ing) => `<span class="ingredient-tag"><i class="fas fa-check-circle"></i> ${ing}</span>`).join("")}</div>`;
        document.getElementById("info-panel").classList.add("show");
      }
      function closeInfoPanel() {
        document.getElementById("info-panel").classList.remove("show");
      }

      window.selectProduct = function (id) {
        const product = products.find((p) => p.id === id);
        if (!product) return;
        currentProduct = product;
        currentQuantity = 1;
        document.getElementById("quantity").textContent = "1";
        document.getElementById("ar-product-name").innerHTML =
          `<i class="fas fa-cube"></i> ${product.name}`;
        document.getElementById("ar-product-price").textContent =
          `R$ ${product.price.toFixed(2)}`;
        const modelContainer = document.getElementById("ar-model");
        modelContainer.innerHTML = "";
        const model = document.createElement("a-entity");
        model.setAttribute(
          "gltf-model",
          `url(assets/models/${product.modelFile})`,
        );
        model.setAttribute("scale", product.scale);
        model.setAttribute("position", product.position);
        model.setAttribute("class", "clickable");
        model.setAttribute("animation", {
          property: "rotation",
          to: "0 360 0",
          dur: 15000,
          easing: "linear",
          loop: true,
          enabled: true,
        });
        model.addEventListener("click", function (e) {
          e.stopPropagation();
          const anim = model.getAttribute("animation");
          anim.enabled = !anim.enabled;
          model.setAttribute("animation", anim);
        });
        modelContainer.appendChild(model);
        document
          .getElementById("ar-model-container")
          .setAttribute("position", "0 0.5 -4");
        document.getElementById("menu-screen").classList.add("hide");
        document.getElementById("back-btn").style.display = "flex";
        document.getElementById("order-panel").classList.add("show");
        showProductInfo(product);
      };

      window.addToCart = function () {
        if (!currentProduct) return;
        const existing = cart.find((i) => i.id === currentProduct.id);
        if (existing) existing.quantity += currentQuantity;
        else
          cart.push({
            id: currentProduct.id,
            name: currentProduct.name,
            price: currentProduct.price,
            quantity: currentQuantity,
          });
        updateCartButton();
        backToMenu();
        showToast(
          `✅ ${currentQuantity}x ${currentProduct.name} adicionado!`,
          "#4CAF50",
        );
        if (navigator.vibrate) navigator.vibrate(50);
      };

      function updateCartButton() {
        const total = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById("cart-count").textContent = total;
        document.getElementById("cart-btn").style.display =
          total > 0 ? "flex" : "none";
      }

      window.openCart = function () {
        renderCartItems();
        document.getElementById("cart-screen").style.display = "flex";
      };
      window.closeCart = function () {
        document.getElementById("cart-screen").style.display = "none";
      };

      function renderCartItems() {
        const container = document.getElementById("cart-items-container");
        container.innerHTML = "";
        let total = 0;
        cart.forEach((item, idx) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `<div class="cart-item-info"><h4>${item.name}</h4><p>R$ ${item.price.toFixed(2)} un.</p></div><div class="cart-item-actions"><span class="cart-item-quantity">${item.quantity}x</span><button class="remove-item-btn" onclick="removeFromCart(${idx})"><i class="fas fa-trash"></i> Remover</button></div>`;
          container.appendChild(div);
        });
        document.getElementById("cart-total-value").textContent =
          `R$ ${total.toFixed(2)}`;
        if (cart.length === 0)
          container.innerHTML =
            "<p style='text-align:center; color:rgba(255,255,255,0.5); padding:40px;'><i class='fas fa-shopping-bag'></i> Seu carrinho está vazio.</p>";
      }

      window.removeFromCart = function (idx) {
        cart.splice(idx, 1);
        renderCartItems();
        updateCartButton();
        if (cart.length === 0) closeCart();
        if (navigator.vibrate) navigator.vibrate(30);
      };

      window.sendFullOrder = async function () {
        if (cart.length === 0) return;

        const btn = document.querySelector("#cart-screen .send-order-btn");
        const original = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

        const tableNum =
          parseInt(new URLSearchParams(window.location.search).get("mesa")) ||
          1;
        const cleanUrl = BACKEND_URL.replace(/\/$/, "");

        // 🔧 CORREÇÃO: Garantir que os dados estão corretos
        console.log(
          "🛒 Carrinho sendo enviado:",
          JSON.stringify(cart, null, 2),
        );

        try {
          // Usar o endpoint BULK
          const orderItems = cart.map((item) => ({
            tableNumber: tableNum,
            productId: String(item.id),
            productName: item.name,
            productPrice: Number(item.price), // 🔧 Garantir que é número
            quantity: Number(item.quantity), // 🔧 Garantir que é número
            status: "pending",
            observation: "",
          }));

          console.log("📦 Itens sendo enviados:", orderItems);

          const response = await fetch(`${cleanUrl}/api/orders/bulk`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(orderItems),
          });

          const result = await response.json();
          console.log("✅ Resposta do servidor:", result);

          if (response.ok) {
            cart = [];
            updateCartButton();
            closeCart();
            backToMenu();
            showToast("✅ Pedido enviado com sucesso!", "#4CAF50");
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
          } else {
            console.error("❌ Erro do servidor:", result);
            showToast("⚠️ Erro ao enviar pedido", "#F44336");
          }
        } catch (e) {
          console.error("❌ Erro de conexão:", e);
          showToast("❌ Erro de conexão! Verifique sua internet.", "#F44336");
        } finally {
          btn.disabled = false;
          btn.innerHTML = original;
        }
      };
      window.updateQty = function (val) {
        currentQuantity = Math.max(1, currentQuantity + val);
        document.getElementById("quantity").textContent = currentQuantity;
        if (navigator.vibrate) navigator.vibrate(20);
      };
      window.backToMenu = function () {
        document.getElementById("menu-screen").classList.remove("hide");
        document.getElementById("back-btn").style.display = "none";
        document.getElementById("order-panel").classList.remove("show");
        document.getElementById("ar-model").innerHTML = "";
        closeInfoPanel();
      };
      window.saveUrl = function () {
        let newUrl = document.getElementById("backend-url").value;

        // 🔧 VALIDAÇÃO: Verifica se a URL não está vazia
        if (!newUrl || newUrl.trim() === "") {
          showToast("⚠️ Por favor, insira uma URL válida!", "#F44336");
          return;
        }

        // 🔧 CORREÇÃO: Remove espaços em branco
        newUrl = newUrl.trim();

        // 🔧 CORREÇÃO: Adiciona https:// se não tiver protocolo
        if (!newUrl.startsWith("http://") && !newUrl.startsWith("https://")) {
          newUrl = "https://" + newUrl;
        }

        // 🔧 CORREÇÃO: Remove barra do final se existir
        newUrl = newUrl.replace(/\/$/, "");

        // 🔧 VALIDAÇÃO: Verifica se a URL é válida (formato básico)
        const urlPattern =
          /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;
        if (
          !urlPattern.test(newUrl) &&
          !newUrl.includes("localhost") &&
          !newUrl.includes("ngrok")
        ) {
          console.warn(
            "⚠️ URL parece inválida, mas tentando conectar:",
            newUrl,
          );
        }

        console.log(`💾 Salvando URL: ${newUrl}`);

        // Salva a URL
        BACKEND_URL = newUrl;
        localStorage.setItem("backend_url", BACKEND_URL);

        // Atualiza o campo de input com a URL limpa
        document.getElementById("backend-url").value = BACKEND_URL;

        // Mostra feedback
        showToast(`✅ URL salva: ${BACKEND_URL}`, "#4CAF50");

        // Reconecta WebSocket
        const tableNum =
          parseInt(new URLSearchParams(window.location.search).get("mesa")) ||
          1;

        // Pequeno delay para garantir que o toast seja visto
        setTimeout(() => {
          connectWebSocket(tableNum);
        }, 500);
      };
      window.onload = () => {
        const tableNum =
          parseInt(new URLSearchParams(window.location.search).get("mesa")) ||
          1;
        document.getElementById("table-number").textContent = tableNum;
        document.getElementById("confirm-order").onclick = addToCart;
        renderProducts();
        setupCamera();
        setTimeout(() => connectWebSocket(tableNum), 1000);
      };
    </script>
  </body>
</html>
