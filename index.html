<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Gourmet AR - Cardápio Interativo 3D</title>

    <!-- Preconnect para carregamento mais rápido -->
    <link rel="preconnect" href="https://aframe.io" />
    <link rel="preconnect" href="https://raw.githack.com" />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts Premium -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />

    <!-- Socket.io Client -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-detector.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/gesture-handler.js"></script>

    <style>
      /* Mantém todos os estilos anteriores e adiciona os novos para o console */

      /* ============================================ */
      /* VISUAL CONSOLE - NOVO */
      /* ============================================ */
      #visual-console {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        z-index: 1000;
        font-family: "Monaco", "Menlo", monospace;
        font-size: 11px;
        border: 1px solid rgba(255, 107, 53, 0.3);
        transition: all 0.3s ease;
        max-height: 200px;
        display: flex;
        flex-direction: column;
      }

      #visual-console.minimized {
        max-height: 40px;
        overflow: hidden;
      }

      .console-header {
        background: rgba(255, 107, 53, 0.2);
        padding: 8px 12px;
        border-radius: 15px 15px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        border-bottom: 1px solid rgba(255, 107, 53, 0.3);
      }

      .console-header span {
        color: #ff6b35;
        font-weight: 600;
        font-size: 12px;
      }

      .console-header button {
        background: none;
        border: none;
        color: #ff6b35;
        cursor: pointer;
        font-size: 12px;
        padding: 0 4px;
      }

      .console-header button:hover {
        color: white;
      }

      .console-content {
        padding: 10px;
        overflow-y: auto;
        max-height: 158px;
        font-size: 10px;
        line-height: 1.4;
      }

      .console-log {
        padding: 4px 8px;
        margin: 2px 0;
        border-radius: 6px;
        font-family: monospace;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .console-log.info {
        color: #64b5f6;
        border-left: 3px solid #64b5f6;
        background: rgba(100, 181, 246, 0.1);
      }

      .console-log.success {
        color: #81c784;
        border-left: 3px solid #81c784;
        background: rgba(129, 199, 132, 0.1);
      }

      .console-log.error {
        color: #e57373;
        border-left: 3px solid #e57373;
        background: rgba(229, 115, 115, 0.1);
      }

      .console-log.warning {
        color: #ffb74d;
        border-left: 3px solid #ffb74d;
        background: rgba(255, 183, 77, 0.1);
      }

      .console-log.debug {
        color: #b0bec5;
        border-left: 3px solid #b0bec5;
        background: rgba(176, 190, 197, 0.1);
      }

      .clear-console {
        background: rgba(255, 107, 53, 0.3);
        border: none;
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 10px;
        margin-left: 8px;
      }

      .clear-console:hover {
        background: rgba(255, 107, 53, 0.6);
      }

      /* Ajuste para não sobrepor o botão do carrinho */
      #cart-btn {
        z-index: 1001;
      }

      @media (max-width: 768px) {
        #visual-console {
          left: 10px;
          right: 10px;
          bottom: 10px;
          max-height: 180px;
        }

        .console-content {
          font-size: 9px;
          max-height: 138px;
        }
      }
    </style>
  </head>
  <body>
    <video id="video-background" autoplay playsinline muted></video>

    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      background="transparent: true"
      gesture-detector
      performance="minPixelRatio: 0.5"
    >
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="0.7" position="1 2 1"></a-light>
      <a-light type="point" intensity="0.4" position="0 2 0"></a-light>

      <a-entity camera position="0 0 0">
        <a-entity
          cursor="rayOrigin: mouse"
          raycaster="objects: .clickable"
        ></a-entity>
      </a-entity>

      <a-entity id="ar-model-container" position="0 0.5 -4" gesture-handler>
        <a-entity id="ar-model" class="clickable"></a-entity>
      </a-entity>
    </a-scene>

    <div class="config-panel">
      <input
        type="text"
        id="backend-url"
        placeholder="URL Backend"
        value="http://localhost:3000"
      />
      <button onclick="saveUrl()"><i class="fas fa-save"></i></button>
    </div>

    <div id="menu-screen">
      <div class="header">
        <h1><i class="fas fa-utensils"></i> Gourmet AR</h1>
        <div class="table-info">
          <i class="fas fa-chair"></i>
          Mesa <span id="table-number">1</span>
        </div>
      </div>
      <div id="product-list" class="product-grid"></div>
    </div>

    <div id="connection-status" class="connecting">
      <i class="fas fa-circle"></i>
      <span>Conectando...</span>
    </div>

    <button id="cart-btn" onclick="openCart()">
      <i class="fas fa-shopping-bag"></i>
      Ver Pedido (<span id="cart-count">0</span>)
    </button>

    <div id="cart-screen">
      <div class="cart-header">
        <h2><i class="fas fa-shopping-bag"></i> Seu Pedido</h2>
        <button class="close-cart" onclick="closeCart()">✕</button>
      </div>
      <div id="cart-items-container" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total-price">
          Total: <span id="cart-total-value">R$ 0,00</span>
        </div>
        <button class="send-order-btn" onclick="sendFullOrder()">
          <i class="fas fa-paper-plane"></i> Enviar Pedido para Cozinha
        </button>
      </div>
    </div>

    <button id="back-btn" onclick="backToMenu()">
      <i class="fas fa-arrow-left"></i> Voltar
    </button>

    <div id="order-panel">
      <div class="product-info-ar">
        <span id="ar-product-name">---</span>
        <span id="ar-product-price">R$ 0,00</span>
      </div>
      <div class="order-controls">
        <div class="quantity-control">
          <button class="qty-btn" onclick="updateQty(-1)">-</button>
          <span id="quantity" style="font-weight: bold; font-size: 18px"
            >1</span
          >
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        <button id="confirm-order" class="confirm-btn">
          <i class="fas fa-cart-plus"></i> Adicionar ao Pedido
        </button>
      </div>
    </div>

    <div id="info-panel">
      <button class="close-info" onclick="closeInfoPanel()">
        <i class="fas fa-times"></i>
      </button>
      <div class="info-header">
        <i class="fas fa-info-circle"></i>
        <h3>Informações do Produto</h3>
      </div>
      <div id="info-content"></div>
    </div>

    <div class="camera-status" id="camera-status">
      <i class="fas fa-camera"></i> Aguardando câmera...
    </div>
    <div class="instruction">
      <i class="fas fa-hand-peace"></i> Toque no modelo para pausar/rodar
      animação
    </div>
    <div class="gesture-instruction">
      <i class="fas fa-hand-peace"></i> 1 dedo: move | 2 dedos: gira/pinça
    </div>

    <!-- VISUAL CONSOLE -->
    <div id="visual-console">
      <div class="console-header" onclick="toggleConsole()">
        <span><i class="fas fa-terminal"></i> Console de Debug</span>
        <div>
          <button class="clear-console" onclick="clearConsole(event)">
            Limpar
          </button>
          <button id="console-toggle-btn">
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>
      </div>
      <div id="console-content" class="console-content">
        <div class="console-log info">🚀 Iniciando Gourmet AR...</div>
      </div>
    </div>

    <script>
      // ============================================
      // VISUAL CONSOLE FUNCTIONS
      // ============================================

      function addLog(message, type = "info") {
        const consoleDiv = document.getElementById("console-content");
        if (!consoleDiv) return;

        const logEntry = document.createElement("div");
        logEntry.className = `console-log ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        logEntry.innerHTML = `<i class="fas fa-${type === "error" ? "times-circle" : type === "success" ? "check-circle" : type === "warning" ? "exclamation-triangle" : "info-circle"}"></i> [${timestamp}] ${message}`;

        consoleDiv.appendChild(logEntry);
        logEntry.scrollIntoView({ behavior: "smooth", block: "end" });

        // Também mantém no console do navegador
        const consoleMethod =
          type === "error"
            ? console.error
            : type === "warning"
              ? console.warn
              : console.log;
        consoleMethod(`[${type.toUpperCase()}] ${message}`);
      }

      function clearConsole(event) {
        if (event) event.stopPropagation();
        const consoleDiv = document.getElementById("console-content");
        if (consoleDiv) {
          consoleDiv.innerHTML =
            '<div class="console-log info">🧹 Console limpo</div>';
        }
        addLog("Console limpo", "info");
      }

      function toggleConsole() {
        const consoleEl = document.getElementById("visual-console");
        const toggleBtn = document.getElementById("console-toggle-btn");
        if (consoleEl.classList.contains("minimized")) {
          consoleEl.classList.remove("minimized");
          toggleBtn.innerHTML = '<i class="fas fa-chevron-down"></i>';
          addLog("Console expandido", "debug");
        } else {
          consoleEl.classList.add("minimized");
          toggleBtn.innerHTML = '<i class="fas fa-chevron-up"></i>';
        }
      }

      // ============================================
      // Produtos
      // ============================================
      const products = [
        {
          id: 1,
          name: "Hambúrguer Artesanal",
          description:

          price: 32.9,

          color: "#ff9800",
          scale: "0.25 0.25 0.25",
          position: "0 0.6 0",
          ingredients: [

          ],

            carbs: "45g",

          },
        },
        {
          id: 2,
          name: "Pizza Margherita",
          description: "Pizza tradicional italiana com ingredientes frescos",
          price: 45.9,
          modelFile: "pizza.glb",
          image:
            "https://images.aws.nestle.recipes/original/1821a30a8a8acec9f74a1372be582610_sem_t%C3%ADtulo_(18).jpg",
          color: "#f44336",
          scale: "0.9 0.9 0.9",
          position: "0 0 0",
          ingredients: [
            "Massa Fininha",

            "Orégano",
          ],
          nutrition: {
            calories: "780 kcal",

            carbs: "95g",

          },
        },
        {
          id: 3,

          description: "Coca-Cola 350ml - Bem gelada",

      let cart = [];

      // ============================================
      // WEBSOCKET FUNCTIONS COM LOGS
      // ============================================

      function showToast(message, color = "#4CAF50") {
        let toast = document.getElementById("toast-message");
        if (!toast) {
          toast = document.createElement("div");
          toast.id = "toast-message";
          toast.className = "toast-message";
          document.body.appendChild(toast);
        }

        toast.textContent = message;
        toast.style.backgroundColor = color;
        toast.classList.add("show");
        addLog(`📢 Toast: ${message}`, "info");

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      function showOrderNotification(productName) {
        addLog(`🎉 NOTIFICAÇÃO: Pedido ${productName} está pronto!`, "success");

        let notification = document.getElementById("order-notification");

        if (!notification) {
          notification = document.createElement("div");
          notification.id = "order-notification";
          notification.className = "order-notification";
          notification.innerHTML = `
            <div class="notification-content">
              <div class="notification-icon">🎉</div>
              <div class="notification-text">
                <h4>Pedido Pronto!</h4>
                <p>Seu pedido está pronto para retirada</p>
              </div>
              <button class="notification-close">×</button>
            </div>
          `;
          document.body.appendChild(notification);

          const closeBtn = notification.querySelector(".notification-close");
          closeBtn.addEventListener("click", () => {
            notification.classList.remove("show");
          });

          notification.addEventListener("click", (e) => {
            if (e.target !== closeBtn) {
              notification.classList.remove("show");
              showToast("🎉 Aproveite sua refeição!", "#4CAF50");
            }
          });
        }

        const textDiv = notification.querySelector(".notification-text");
        textDiv.innerHTML = `
          <h4>🍕 Pedido Pronto!</h4>
          <p>Seu ${productName} está pronto para retirada</p>
        `;

        notification.classList.add("show");

        try {
          const audio = new Audio("/sounds/notification.mp3");
          audio.volume = 0.5;
          audio
            .play()
            .catch((e) => addLog(`Som bloqueado: ${e.message}`, "warning"));
        } catch (e) {
          addLog(`Erro ao tocar som: ${e.message}`, "warning");
        }

        if (navigator.vibrate) {
          navigator.vibrate([200, 100, 200]);
          addLog(`📳 Vibração acionada`, "debug");
        }

        setTimeout(() => {
          if (notification.classList.contains("show")) {
            notification.classList.remove("show");
          }
        }, 8000);
      }

      function updateConnectionStatus(status, message) {
        const statusDiv = document.getElementById("connection-status");
        statusDiv.className = status;
        statusDiv.innerHTML = `
          <i class="fas fa-circle"></i>
          <span>${message}</span>
        `;
        addLog(
          `🔌 Status da conexão: ${message}`,
          status === "connected"
            ? "success"
            : status === "connecting"
              ? "info"
              : "error",
        );
      }

      function connectWebSocket(tableNumber) {
        if (socket) {
          addLog(`Desconectando socket anterior...`, "debug");
          socket.disconnect();
        }

        const wsUrl = BACKEND_URL;
        addLog(`🔌 Tentando conectar WebSocket em: ${wsUrl}`, "info");
        updateConnectionStatus("connecting", "Conectando...");

        try {
          addLog(
            `📡 Configurando socket com query: tableNumber=${tableNumber}, type=customer`,
            "debug",
          );

          socket = io(wsUrl, {
            query: {
              tableNumber: tableNumber,
              type: "customer",
              "ngrok-skip-browser-warning": "true",
            },
            transports: ["websocket", "polling"],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 2000,
            timeout: 10000,
            transportOptions: {
              polling: {
                extraHeaders: {
                  "ngrok-skip-browser-warning": "true",
                },
              },
            },
          });

          socket.on("connect", () => {
            addLog(
              `✅ WebSocket conectado! ID: ${socket.id} | Mesa: ${tableNumber}`,
              "success",
            );
            updateConnectionStatus("connected", "Conectado");
            socket.emit("join-table", { tableNumber });
            addLog(
              `📨 Evento 'join-table' enviado para mesa ${tableNumber}`,
              "debug",
            );
          });

          socket.on("connect_error", (error) => {
            addLog(`❌ Erro de conexão WebSocket: ${error.message}`, "error");
            addLog(
              `⚠️ Verifique se o servidor está rodando e a URL está correta: ${wsUrl}`,
              "warning",
            );
            updateConnectionStatus("disconnected", "Falha na conexão");
          });

          socket.on("disconnect", (reason) => {
            addLog(`❌ WebSocket desconectado. Motivo: ${reason}`, "warning");
            updateConnectionStatus("disconnected", "Desconectado");
          });

          socket.on("order-confirmed", (data) => {
            addLog(
              `✅ Pedido confirmado pela cozinha! Pedido ID: ${data.orderId}`,
              "success",
            );
            showToast(`✅ Pedido recebido pela cozinha!`, "#4CAF50");
          });

          socket.on("order-ready", (data) => {
            addLog(
              `🎉 PEDIDO PRONTO! ${data.productName} - Mesa ${tableNumber}`,
              "success",
            );
            showOrderNotification(data.productName);
          });

          socket.on("order-updated", (data) => {
            addLog(
              `📦 Status atualizado: ${data.status} para pedido ${data.orderId}`,
              "info",
            );
            if (data.status === "preparing") {
              showToast("👨‍🍳 Seu pedido está sendo preparado!", "#FF9800");
            }
          });

          socket.on("table-joined", (data) => {
            addLog(`✅ ${data.message}`, "success");
          });
        } catch (error) {
          addLog(
            `❌ Erro ao criar conexão WebSocket: ${error.message}`,
            "error",
          );
          updateConnectionStatus("disconnected", "Erro de conexão");
        }
      }

      function disconnectWebSocket() {
        if (socket) {
          addLog(`🔌 Desconectando WebSocket manualmente...`, "info");
          socket.disconnect();
          socket = null;
        }
      }

      // ============================================
      // APP FUNCTIONS
      // ============================================

      async function setupCamera() {
        const video = document.getElementById("video-background");
        addLog(`📷 Iniciando câmera...`, "info");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "environment",
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
          });
          video.srcObject = stream;
          document.getElementById("camera-status").innerHTML =
            '<i class="fas fa-camera"></i> Câmera Ativa';
          document.getElementById("camera-status").style.color = "#ff6b35";
          addLog(`✅ Câmera traseira ativada com sucesso!`, "success");
        } catch (e) {
          document.getElementById("camera-status").innerHTML =
            '<i class="fas fa-exclamation-triangle"></i> Erro na câmera';
          addLog(`❌ Erro ao acessar câmera: ${e.message}`, "error");
          console.error("Erro ao acessar câmera:", e);
        }
      }

      function renderProducts() {
        const container = document.getElementById("product-list");
        container.innerHTML = "";
        products.forEach((p) => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <div class="product-image">
              <img src="${p.image}" alt="${p.name}" loading="lazy" />
            </div>
            <div class="product-info">
              <h3>${p.name}</h3>
              <p class="product-description">${p.description}</p>
              <div class="product-price">R$ ${p.price.toFixed(2)}</div>
              <button class="select-btn" onclick="selectProduct(${p.id})">
                <i class="fas fa-cube"></i> Ver em 3D
              </button>
            </div>
          `;
          container.appendChild(card);
        });
        addLog(
          `📋 Cardápio renderizado com ${products.length} produtos`,
          "info",
        );
      }

      function showProductInfo(product) {
        const infoContent = document.getElementById("info-content");

        const ingredientsHtml = product.ingredients
          .map(
            (ing) => `
          <span class="ingredient-tag">
            <i class="fas fa-check-circle"></i> ${ing}
          </span>
        `,
          )
          .join("");

        const nutritionHtml = product.nutrition
          ? `
          <div class="info-nutrition">
            <div class="nutrition-item">
              <span><i class="fas fa-fire"></i> Calorias</span>
              <span>${product.nutrition.calories}</span>
            </div>
            <div class="nutrition-item">
              <span><i class="fas fa-dumbbell"></i> Proteínas</span>
              <span>${product.nutrition.protein}</span>
            </div>
            <div class="nutrition-item">
              <span><i class="fas fa-bread-slice"></i> Carboidratos</span>
              <span>${product.nutrition.carbs}</span>
            </div>
            <div class="nutrition-item">
              <span><i class="fas fa-oil-can"></i> Gorduras</span>
              <span>${product.nutrition.fat}</span>
            </div>
          </div>
        `
          : "";

        infoContent.innerHTML = `
          <div class="info-description">
            <i class="fas fa-align-left"></i> ${product.description}
          </div>
          <div class="info-header" style="margin-top: 8px;">
            <i class="fas fa-leaf"></i>
            <h3 style="font-size: 16px;">Ingredientes</h3>
          </div>
          <div class="ingredients-list">
            ${ingredientsHtml}
          </div>
          ${nutritionHtml}
        `;

        document.getElementById("info-panel").classList.add("show");
        addLog(`📄 Info do produto "${product.name}" exibida`, "debug");
      }

      function closeInfoPanel() {
        document.getElementById("info-panel").classList.remove("show");
      }

      window.selectProduct = function (id) {
        const product = products.find((p) => p.id === id);
        if (!product) return;

        currentProduct = product;
        currentQuantity = 1;
        document.getElementById("quantity").textContent = "1";
        document.getElementById("ar-product-name").innerHTML =
          `<i class="fas fa-cube"></i> ${product.name}`;
        document.getElementById("ar-product-price").textContent =
          `R$ ${product.price.toFixed(2)}`;

        const modelContainer = document.getElementById("ar-model");
        modelContainer.innerHTML = "";

        const model = document.createElement("a-entity");
        model.setAttribute(
          "gltf-model",
          `url(assets/models/${product.modelFile})`,
        );
        model.setAttribute("scale", product.scale);
        model.setAttribute("position", product.position || "0 0 0");
        model.setAttribute("class", "clickable");

        model.setAttribute("animation", {
          property: "rotation",
          to: "0 360 0",
          dur: 15000,
          easing: "linear",
          loop: true,
          enabled: true,
        });

        model.addEventListener("click", function (e) {
          e.stopPropagation();
          const anim = model.getAttribute("animation");
          if (anim && anim.enabled) {
            model.setAttribute("animation", "enabled", false);
            isRotating = false;
            addLog(`⏸️ Animação do modelo pausada`, "debug");
          } else {
            model.setAttribute("animation", "enabled", true);
            isRotating = true;
            addLog(`▶️ Animação do modelo retomada`, "debug");
          }
        });

        modelContainer.appendChild(model);
        currentModel = model;

        const container = document.getElementById("ar-model-container");
        container.setAttribute("position", "0 0.5 -4");
        container.setAttribute("rotation", "0 0 0");
        container.setAttribute("scale", "1 1 1");

        document.getElementById("menu-screen").classList.add("hide");
        document.getElementById("back-btn").style.display = "flex";
        document.getElementById("order-panel").classList.add("show");

        showProductInfo(product);
        addLog(`🎨 Modelo 3D carregado para: ${product.name}`, "success");
      };

      window.addToCart = function () {
        if (!currentProduct) return;

        const existingItem = cart.find((item) => item.id === currentProduct.id);
        if (existingItem) {
          existingItem.quantity += currentQuantity;
          addLog(
            `🛒 Atualizado ${currentProduct.name}: ${currentQuantity}x (total: ${existingItem.quantity}x)`,
            "info",
          );
        } else {
          cart.push({
            id: currentProduct.id,
            name: currentProduct.name,
            price: currentProduct.price,
            quantity: currentQuantity,
          });
          addLog(
            `🛒 Adicionado ${currentProduct.name}: ${currentQuantity}x ao carrinho`,
            "success",
          );
        }

        updateCartButton();
        backToMenu();

        if (navigator.vibrate) navigator.vibrate(50);
        showToast(
          `✅ ${currentQuantity}x ${currentProduct.name} adicionado!`,
          "#4CAF50",
        );
      };

      function updateCartButton() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const btn = document.getElementById("cart-btn");
        document.getElementById("cart-count").textContent = totalItems;
        btn.style.display = totalItems > 0 ? "flex" : "none";
        addLog(`🛒 Carrinho atualizado: ${totalItems} itens`, "debug");
      }

      window.openCart = function () {
        renderCartItems();
        document.getElementById("cart-screen").style.display = "flex";
        addLog(`🛒 Carrinho aberto`, "debug");
      };

      window.closeCart = function () {
        document.getElementById("cart-screen").style.display = "none";
      };

      function renderCartItems() {
        const container = document.getElementById("cart-items-container");
        container.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          total += itemTotal;
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `
            <div class="cart-item-info">
              <h4>${item.name}</h4>
              <p>R$ ${item.price.toFixed(2)} un.</p>
            </div>
            <div class="cart-item-actions">
              <span class="cart-item-quantity">${item.quantity}x</span>
              <button class="remove-item-btn" onclick="removeFromCart(${index})">
                <i class="fas fa-trash"></i> Remover
              </button>
            </div>
          `;
          container.appendChild(div);
        });

        document.getElementById("cart-total-value").textContent =
          `R$ ${total.toFixed(2)}`;
        if (cart.length === 0) {
          container.innerHTML =
            "<p style='text-align:center; color:rgba(255,255,255,0.5); padding:40px;'><i class='fas fa-shopping-bag'></i> Seu carrinho está vazio.</p>";
        }
      }

      window.removeFromCart = function (index) {
        const removed = cart[index];
        cart.splice(index, 1);
        renderCartItems();
        updateCartButton();
        if (cart.length === 0) closeCart();
        if (navigator.vibrate) navigator.vibrate(30);
        addLog(`🗑️ Removido ${removed.name} do carrinho`, "info");
      };

      window.sendFullOrder = async function () {
        if (cart.length === 0) return;

        const btn = document.querySelector("#cart-screen .send-order-btn");
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

        const urlParams = new URLSearchParams(window.location.search);
        const tableNum = parseInt(urlParams.get("mesa")) || 1;
        const cleanUrl = BACKEND_URL.endsWith("/")
          ? BACKEND_URL.slice(0, -1)
          : BACKEND_URL;

        addLog(
          `📤 Enviando pedido da mesa ${tableNum} para ${cleanUrl}/api/orders`,
          "info",
        );
        addLog(
          `📦 Itens: ${cart.map((i) => `${i.quantity}x ${i.name}`).join(", ")}`,
          "debug",
        );

        try {
          const promises = cart.map((item) => {
            const orderData = {
              tableNumber: tableNum,
              productId: String(item.id),
              productName: item.name,
              productPrice: item.price,
              quantity: item.quantity,
              status: "pending",
              observation: "",
            };
            return fetch(`${cleanUrl}/api/orders`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "true",
              },
              body: JSON.stringify(orderData),
            });
          });

          const results = await Promise.all(promises);
          const allOk = results.every((res) => res.ok);

          if (allOk) {
            addLog(
              `✅ Pedido enviado com sucesso! ${cart.length} itens enviados`,
              "success",
            );
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            cart = [];
            updateCartButton();
            closeCart();
            backToMenu();
            showToast("✅ Pedido enviado com sucesso!", "#4CAF50");
          } else {
            addLog(
              `⚠️ Alguns itens não foram enviados. Status: ${results.map((r) => r.status).join(", ")}`,
              "warning",
            );
            showToast("⚠️ Alguns itens não foram enviados.", "#F44336");
          }
        } catch (e) {
          addLog(`❌ Erro ao enviar pedido: ${e.message}`, "error");
          showToast("❌ Erro de conexão! Verifique sua internet.", "#F44336");
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalText;
        }
      };

      window.updateQty = function (val) {
        currentQuantity = Math.max(1, currentQuantity + val);
        document.getElementById("quantity").textContent = currentQuantity;
        if (navigator.vibrate) navigator.vibrate(20);
      };

      window.backToMenu = function () {
        document.getElementById("menu-screen").classList.remove("hide");
        document.getElementById("back-btn").style.display = "none";
        document.getElementById("order-panel").classList.remove("show");
        document.getElementById("ar-model").innerHTML = "";
        closeInfoPanel();
        addLog(`↩️ Voltando ao menu principal`, "debug");
      };

      window.saveUrl = function () {
        const newUrl = document.getElementById("backend-url").value;
        BACKEND_URL = newUrl;
        localStorage.setItem("backend_url", BACKEND_URL);
        addLog(`💾 URL salva: ${BACKEND_URL}`, "success");
        showToast("URL salva! Reconectando...", "#4CAF50");

        const urlParams = new URLSearchParams(window.location.search);
        const tableNum = parseInt(urlParams.get("mesa")) || 1;
        connectWebSocket(tableNum);
      };

      // Teste de conexão HTTP para verificar se o servidor está acessível
      async function testHttpConnection() {
        const cleanUrl = BACKEND_URL.endsWith("/")
          ? BACKEND_URL.slice(0, -1)
          : BACKEND_URL;
        addLog(`🔍 Testando conexão HTTP com: ${cleanUrl}/api/orders`, "info");

        try {
          const response = await fetch(`${cleanUrl}/api/orders`, {
            headers: { "ngrok-skip-browser-warning": "true" },
          });
          if (response.ok) {
            const data = await response.json();
            addLog(
              `✅ HTTP OK! Servidor respondeu com ${data.length} pedidos`,
              "success",
            );
          } else {
            addLog(
              `⚠️ HTTP respondeu com status: ${response.status}`,
              "warning",
            );
          }
        } catch (error) {
          addLog(`❌ Falha no HTTP: ${error.message}`, "error");
          addLog(
            `💡 Verifique se a URL está correta e o servidor está rodando`,
            "warning",
          );
        }
      }

      window.onload = () => {
        addLog(`🚀 Gourmet AR iniciado!`, "success");
        addLog(`📱 User Agent: ${navigator.userAgent}`, "debug");

        const urlParams = new URLSearchParams(window.location.search);
        currentTableNumber = parseInt(urlParams.get("mesa")) || 1;
        document.getElementById("table-number").textContent =
          currentTableNumber;
        document.getElementById("confirm-order").onclick = addToCart;

        addLog(`📋 Mesa configurada: ${currentTableNumber}`, "info");
        addLog(`🌐 URL do Backend: ${BACKEND_URL}`, "info");

        renderProducts();
        setupCamera();

        // Testar HTTP primeiro
        setTimeout(() => {
          testHttpConnection();
        }, 1000);

        // Conectar WebSocket
        setTimeout(() => {
          connectWebSocket(currentTableNumber);
        }, 2000);

        addLog(`🎯 Aguardando notificações de pedido pronto...`, "info");
      };
    </script>
  </body>
</html>
